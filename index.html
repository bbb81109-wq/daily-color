<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Anmita Riga 宇宙訊號</title>
  <meta name="description" content="透過色彩、脈輪和物件，發現內在的靜謐角落。Anmita Riga 宇宙訊號 - 每日祝福、脈輪貓、靜觀空間">
  <meta property="og:title" content="Anmita Riga 宇宙訊號">
  <meta property="og:description" content="透過色彩、脈輪和物件，發現內在的靜謐角落">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://euphonious-lebkuchen-60376f.netlify.app/icon-512.png">
  <meta property="og:locale" content="zh_TW">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Anmita Riga 宇宙訊號">
  <meta name="twitter:description" content="透過色彩、脈輪和物件，發現內在的靜謐角落">
  <meta name="theme-color" content="#F5F3F8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="宇宙訊號">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="liff.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #F5F3F8 0%, #F2EAE4 50%, #F5F3F8 100%);
      font-family: "Noto Serif TC", Georgia, serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.8rem 5rem;
      color: #5A5059;
      overflow-x: hidden;
      position: relative;
    }

    /* 柔和背景光暈 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 900px 500px at 15% 20%, rgba(216, 198, 240, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 800px 450px at 85% 25%, rgba(242, 234, 228, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse 750px 400px at 50% 85%, rgba(232, 223, 245, 0.07) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .hero {
      text-align: center;
      margin-bottom: 5rem;
      padding-top: 2rem;
    }

    .hero-title {
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #5A5059;
      margin-bottom: 0.4rem;
      line-height: 1.4;
    }

    .hero-sub {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      color: #9A8A9A;
      line-height: 1.8;
      font-weight: 300;
    }

    /* 軌道系統 */
    .orbital-system {
      position: relative;
      width: 420px;
      height: 420px;
      margin: 0 auto 4rem;
    }

    /* 軌道線 */
    .orbital-track {
      position: absolute;
      inset: 0;
      border: 1px dashed rgba(168, 153, 154, 0.25);
      border-radius: 50%;
      animation: orbitSpin 45s linear infinite reverse;
    }

    @keyframes orbitSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* 行星容器 */
    .entries {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-entry {
      position: absolute;
      width: 140px;
      height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      cursor: pointer;
      gap: 0;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      -webkit-tap-highlight-color: transparent;
      padding: 2rem 1.2rem;
    }

    .btn-entry:hover { transform: scale(1.1); }
    .btn-entry:active { transform: scale(0.95); transition-duration: 0.1s; }

    /* 行星各自位置 */
    .blessing {
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      animation: planetFloat-1 4s ease-in-out infinite;
    }

    .chakra {
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      animation: planetFloat-2 4.5s ease-in-out infinite;
    }

    .room {
      top: 50%;
      right: 0;
      transform: translateY(-50%);
      animation: planetFloat-3 4.2s ease-in-out infinite;
    }

    .exhibition {
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      animation: planetFloat-4 4.7s ease-in-out infinite;
    }

    @keyframes planetFloat-1 {
      0%, 100% { transform: translateX(-50%) translateY(0px); }
      50% { transform: translateX(-50%) translateY(-8px); }
    }

    @keyframes planetFloat-2 {
      0%, 100% { transform: translateX(-50%) translateY(0px); }
      50% { transform: translateX(-50%) translateY(8px); }
    }

    @keyframes planetFloat-3 {
      0%, 100% { transform: translateY(-50%) translateX(0px); }
      50% { transform: translateY(-50%) translateX(-8px); }
    }

    @keyframes planetFloat-4 {
      0%, 100% { transform: translateY(-50%) translateX(0px); }
      50% { transform: translateY(-50%) translateX(8px); }
    }

    /* 行星視覺 */
    .btn-visual {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      transition: all 0.5s ease;
      position: relative;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .btn-entry:hover .btn-visual {
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
    }

    /* 行星環 */
    .btn-visual::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .btn-entry:hover .btn-visual::before {
      opacity: 1;
    }

    /* 光暈 */
    .btn-visual::after {
      content: '';
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    .btn-entry:hover .btn-visual::after {
      opacity: 1;
    }

    /* 金星（祝福）— 溫暖金色 + 太陽光暈 */
    .blessing .btn-visual {
      background: linear-gradient(135deg, #F0D898 0%, #E8C97A 100%);
    }

    .blessing .btn-visual::before {
      box-shadow: inset 0 0 30px rgba(240, 216, 152, 0.5);
    }

    .blessing .btn-visual::after {
      box-shadow: 0 0 40px rgba(240, 216, 152, 0.6);
    }

    /* 紫星（脈輪）— 神祕深紫 + 靈性光圈 */
    .chakra .btn-visual {
      background: linear-gradient(135deg, #D4C0EC 0%, #C4AADF 100%);
    }

    .chakra .btn-visual::before {
      box-shadow: inset 0 0 30px rgba(196, 170, 223, 0.5);
    }

    .chakra .btn-visual::after {
      box-shadow: 0 0 40px rgba(196, 170, 223, 0.6);
    }

    /* 藍星（靜觀）— 清冷藍 + 冷靜光環 */
    .room .btn-visual {
      background: linear-gradient(135deg, #A8D4E4 0%, #8EC4D8 100%);
    }

    .room .btn-visual::before {
      box-shadow: inset 0 0 30px rgba(142, 196, 216, 0.5);
    }

    .room .btn-visual::after {
      box-shadow: 0 0 40px rgba(142, 196, 216, 0.6);
    }

    /* 粉星（能量創作）— 溫柔粉紅 + 溫暖光暈 */
    .exhibition .btn-visual {
      background: linear-gradient(135deg, #E8C8DC 0%, #D8B8CC 100%);
    }

    .exhibition .btn-visual::before {
      box-shadow: inset 0 0 30px rgba(200, 150, 180, 0.5);
    }

    .exhibition .btn-visual::after {
      box-shadow: 0 0 40px rgba(200, 150, 180, 0.6);
    }

    /* 行星符號 */
    .btn-symbol {
      font-size: 2.4rem;
      line-height: 1;
      opacity: 0.8;
      transition: all 0.5s ease;
    }

    .btn-entry:hover .btn-symbol {
      opacity: 1;
      transform: scale(1.2) rotate(360deg);
    }

    /* 文字區 */
    .btn-text {
      text-align: center;
      width: 100%;
    }

    .btn-label {
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
      color: #5A5059;
      line-height: 1.4;
    }

    .btn-desc {
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      line-height: 1.6;
      color: #8A7A8A;
      font-weight: 300;
    }

    /* 底部標語 */
    .footer-note {
      margin-top: 3rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: #A8999A;
      text-align: center;
      font-weight: 300;
      line-height: 1.8;
    }

    .fade-out { animation: fadeOut 0.5s ease forwards; }
    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* 響應式 */
    @media (max-width: 480px) {
      body { padding: 3rem 1.5rem 4rem; }
      .hero { margin-bottom: 3.5rem; }
      .hero-title { font-size: 1.5rem; }
      .orbital-system { width: 320px; height: 320px; margin-bottom: 3rem; }
      .btn-entry { width: 110px; padding: 1.5rem 1rem; }
      .btn-visual { width: 100px; height: 100px; margin-bottom: 0.8rem; }
      .btn-symbol { font-size: 2rem; }
      .btn-label { font-size: 0.85rem; }
      .btn-desc { font-size: 0.65rem; }
    }
  </style>
</head>
<body>

  <div class="content">

    <div class="hero">
      <div class="hero-title">Anmita Riga</div>
      <div class="hero-sub">宇 宙 訊 號</div>
    </div>

    <div class="orbital-system">
      <div class="orbital-track"></div>

      <div class="entries">

        <a class='btn-entry blessing' href='/daily-color'>
          <div class="btn-visual">
            <div class="btn-symbol">✦</div>
          </div>
          <div class="btn-text">
            <div class="btn-label">接收祝福</div>
            <div class="btn-desc">今日的色彩訊息<br>給你一個靜觀的起點</div>
          </div>
        </a>

        <a class='btn-entry chakra' href='/chakra-cat'>
          <div class="btn-visual">
            <div class="btn-symbol">◆</div>
          </div>
          <div class="btn-text">
            <div class="btn-label">覺察能量</div>
            <div class="btn-desc">感受七個能量中心<br>聆聽身體此刻的聲音</div>
          </div>
        </a>

        <a class='btn-entry room' href='/cat-room'>
          <div class="btn-visual">
            <div class="btn-symbol">◈</div>
          </div>
          <div class="btn-text">
            <div class="btn-label">靜觀空間</div>
            <div class="btn-desc">透過色彩與物件的組合<br>發現內在的靜謐角落</div>
          </div>
        </a>

        <a class='btn-entry exhibition' href='/exhibition'>
          <div class="btn-visual">
            <div class="btn-symbol">◇</div>
          </div>
          <div class="btn-text">
            <div class="btn-label">能量創作</div>
            <div class="btn-desc">瀏覽靈性藝廊<br>發現和邀請</div>
          </div>
        </a>

      </div>
    </div>

    <div class="footer-note">每一刻都是一個重新開始的機會</div>

  </div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  initLiff();

  document.querySelectorAll('.btn-entry').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      const href = this.getAttribute('href');
      document.body.classList.add('fade-out');
      setTimeout(() => { window.location.href = href; }, 490);
    });
  });
</script>
</body>
</html>
