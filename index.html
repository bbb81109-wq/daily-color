<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Anmita Riga 宇宙訊號</title>
  <meta name="description" content="透過色彩、脈輪和物件，發現內在的靜謐角落。Anmita Riga 宇宙訊號 - 每日祝福、脈輪貓、靜觀空間">
  <meta name="theme-color" content="#F5F3F8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="宇宙訊號">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="liff.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #F5F3F8 0%, #F2EAE4 50%, #F5F3F8 100%);
      font-family: "Noto Serif TC", Georgia, serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.8rem 5rem;
      color: #5A5059;
      overflow-x: hidden;
      position: relative;
    }

    /* 柔和背景光暈 - 莫蘭迪色系 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 900px 500px at 15% 20%, rgba(216, 198, 240, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 800px 450px at 85% 25%, rgba(242, 234, 228, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse 750px 400px at 50% 85%, rgba(232, 223, 245, 0.07) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* 主內容 */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* 標題區 */
    .hero {
      text-align: center;
      margin-bottom: 5rem;
      padding-top: 2rem;
    }

    .hero-title {
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #5A5059;
      margin-bottom: 0.4rem;
      line-height: 1.4;
    }

    .hero-sub {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      color: #9A8A9A;
      line-height: 1.8;
      font-weight: 300;
    }

    /* 入口容器 - 高級留白 */
    .entries {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3.5rem;
      width: 100%;
      max-width: 320px;
    }

    /* 卡片按鈕 - 高級感 */
    .btn-entry {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      cursor: pointer;
      gap: 0;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      -webkit-tap-highlight-color: transparent;
    }

    .btn-entry:hover { transform: translateY(-6px); }
    .btn-entry:active { transform: scale(0.98); transition-duration: 0.1s; }

    /* 抽象漸層圖形 - 替代黑貓 */
    .btn-visual {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
      transition: all 0.5s ease;
      position: relative;
      box-shadow:
        0 4px 20px rgba(0, 0, 0, 0.04),
        0 12px 40px rgba(0, 0, 0, 0.03);
      overflow: hidden;
    }

    .btn-visual::before {
      content: '';
      position: absolute;
      inset: 0;
      background: inherit;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .btn-entry:hover .btn-visual {
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.08),
        0 20px 60px rgba(0, 0, 0, 0.06);
      transform: scale(1.05);
    }

    /* 脈輪光暈 */
    .btn-visual::after {
      content: '';
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    .btn-entry:hover .btn-visual::after {
      opacity: 1;
    }

    /* 三種卡片視覺 */
    .blessing .btn-visual {
      background: linear-gradient(135deg, #D8C6F0 0%, #E8DFF5 100%);
    }

    .blessing .btn-visual::after {
      box-shadow: inset 0 0 40px rgba(216, 198, 240, 0.4);
    }

    .chakra .btn-visual {
      background: linear-gradient(135deg, #E8DFF5 0%, #D8C6F0 100%);
    }

    .chakra .btn-visual::after {
      box-shadow: inset 0 0 40px rgba(232, 223, 245, 0.4);
    }

    .room .btn-visual {
      background: linear-gradient(135deg, #F2EAE4 0%, #E8DFF5 100%);
    }

    .room .btn-visual::after {
      box-shadow: inset 0 0 40px rgba(242, 234, 228, 0.3);
    }

    /* 幾何符號 - 極簡 */
    .btn-symbol {
      font-size: 2.8rem;
      line-height: 1;
      opacity: 0.7;
      transition: all 0.5s ease;
    }

    .btn-entry:hover .btn-symbol {
      opacity: 1;
      transform: scale(1.15);
    }

    /* 文字區 */
    .btn-text {
      text-align: center;
      width: 100%;
    }

    .btn-label {
      font-size: 1.08rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      margin-bottom: 0.6rem;
      color: #5A5059;
      line-height: 1.5;
    }

    .btn-desc {
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      line-height: 1.8;
      color: #8A7A8A;
      font-weight: 300;
    }

    /* 底部標語 */
    .footer-note {
      margin-top: 5rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: #A8999A;
      text-align: center;
      font-weight: 300;
      line-height: 1.8;
    }

    /* 淡出轉場 */
    .fade-out { animation: fadeOut 0.5s ease forwards; }
    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* 響應式 */
    @media (max-width: 480px) {
      body { padding: 3rem 1.5rem 4rem; }
      .hero { margin-bottom: 4rem; }
      .hero-title { font-size: 1.5rem; }
      .entries { gap: 3rem; max-width: 280px; }
      .btn-visual { width: 160px; height: 160px; margin-bottom: 1.5rem; }
      .btn-symbol { font-size: 2.4rem; }
      .btn-label { font-size: 0.95rem; }
      .btn-desc { font-size: 0.7rem; }
    }
  </style>
</head>
<body>

  <div class="content">

    <div class="hero">
      <div class="hero-title">Anmita Riga</div>
      <div class="hero-sub">宇 宙 訊 號</div>
    </div>

    <div class="entries">

      <a class="btn-entry blessing" href="daily-color.html">
        <div class="btn-visual">
          <div class="btn-symbol">◐</div>
        </div>
        <div class="btn-text">
          <div class="btn-label">接收祝福</div>
          <div class="btn-desc">今日的色彩訊息<br>給你一個靜觀的起點</div>
        </div>
      </a>

      <a class="btn-entry chakra" href="chakra-cat.html">
        <div class="btn-visual">
          <div class="btn-symbol">◆</div>
        </div>
        <div class="btn-text">
          <div class="btn-label">覺察能量</div>
          <div class="btn-desc">感受七個能量中心<br>聆聽身體此刻的聲音</div>
        </div>
      </a>

      <a class="btn-entry room" href="cat-room.html">
        <div class="btn-visual">
          <div class="btn-symbol">◈</div>
        </div>
        <div class="btn-text">
          <div class="btn-label">靜觀空間</div>
          <div class="btn-desc">透過色彩與物件的組合<br>發現內在的靜謐角落</div>
        </div>
      </a>

    </div>

    <div class="footer-note">每一刻都是一個重新開始的機會</div>

  </div>

<script>
  // ── PWA Service Worker ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // ── LIFF 初始化 ──
  initLiff();

  // ── 點擊淡出轉場 ──
  document.querySelectorAll('.btn-entry').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      const href = this.getAttribute('href');
      document.body.classList.add('fade-out');
      setTimeout(() => { window.location.href = href; }, 490);
    });
  });
</script>
</body>
</html>
