<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>每日色彩</title>
  <meta name="theme-color" content="#faf9ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="每日色彩">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="liff.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #faf9ff 0%, #f5f8ff 100%);
      font-family: "Noto Serif TC", Georgia, serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      color: #4a3f73;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 800px 400px at 20% 30%, rgba(255, 182, 193, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse 600px 350px at 75% 20%, rgba(147, 112, 219, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse 700px 380px at 85% 75%, rgba(135, 206, 235, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse 750px 400px at 15% 85%, rgba(255, 215, 100, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── 星空 ── */
    .star-field { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0; }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite var(--delay);
    }
    @keyframes twinkle {
      0%, 100% { opacity: var(--op); transform: scale(1); }
      50%       { opacity: calc(var(--op) * 3.5); transform: scale(1.6); }
    }

    /* ── 主內容 ── */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* ── 標題 ── */
    .hero {
      text-align: center;
      margin-bottom: 3rem;
    }
    .hero-title {
      font-size: 1.45rem;
      font-weight: 400;
      letter-spacing: 0.55em;
      color: #6b5b95;
      margin-bottom: 0.9rem;
      text-shadow: 0 2px 8px rgba(180, 140, 240, 0.15);
    }
    .hero-sub {
      font-size: 0.66rem;
      letter-spacing: 0.38em;
      color: #9b8db5;
      line-height: 2;
    }

    /* ── 入口容器 ── */
    .entries {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.8rem;
      width: 100%;
      max-width: 280px;
    }

    /* ── 按鈕共用 ── */
    .btn-entry {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      cursor: pointer;
      gap: 0;
      /* transform 統一套在這裡，hover/active 控制 */
      transition: transform 0.26s ease-out;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-entry:hover  { transform: translateY(-4px) scale(1.05); }
    .btn-entry:active { transform: scale(0.97); transition-duration: 0.1s; }

    /* ── 圖片 ── */
    .btn-img {
      width: 300px;
      height: auto;
      display: block;
      transition: filter 0.28s ease-out;
    }

    /* ── 圖片下方文字 ── */
    .btn-text {
      margin-top: 1.2rem;
      text-align: center;
    }
    .btn-label {
      font-size: 0.88rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      margin-bottom: 0.4rem;
    }
    .btn-desc {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      line-height: 1.9;
    }

    /* ══════════════════════════════
       卡片一：接收你的祝福
       粉紫色 glow，PNG 透明背景
       drop-shadow 會沿貓咪輪廓發光
    ══════════════════════════════ */
    .blessing .btn-img {
      animation: blessBreath 4.2s ease-in-out infinite;
    }
    @keyframes blessBreath {
      0%, 100% {
        filter:
          drop-shadow(0 0 10px rgba(210, 155, 250, 0.38))
          drop-shadow(0 0 26px rgba(185, 130, 230, 0.18));
      }
      50% {
        filter:
          drop-shadow(0 0 20px rgba(220, 168, 255, 0.60))
          drop-shadow(0 0 50px rgba(195, 145, 240, 0.30));
      }
    }
    .blessing:hover .btn-img {
      filter:
        drop-shadow(0 0 26px rgba(225, 175, 255, 0.80))
        drop-shadow(0 0 65px rgba(205, 155, 250, 0.45)) !important;
      animation: none;
    }
    .blessing:active .btn-img {
      filter: drop-shadow(0 0 5px rgba(210, 155, 250, 0.28)) !important;
      animation: none;
    }
    .blessing .btn-label { color: #8b6fb5; }
    .blessing .btn-desc  { color: #9b8db5; }

    /* ══════════════════════════════
       卡片二：身體正在說什麼
       藍紫色 glow
    ══════════════════════════════ */
    .chakra .btn-img {
      animation: chakraBreath 5s ease-in-out infinite 1.8s;
    }
    @keyframes chakraBreath {
      0%, 100% {
        filter:
          drop-shadow(0 0 10px rgba(130, 158, 235, 0.38))
          drop-shadow(0 0 26px rgba(110, 138, 215, 0.18));
      }
      50% {
        filter:
          drop-shadow(0 0 22px rgba(155, 185, 250, 0.60))
          drop-shadow(0 0 52px rgba(135, 162, 235, 0.30));
      }
    }
    .chakra:hover .btn-img {
      filter:
        drop-shadow(0 0 28px rgba(170, 198, 255, 0.80))
        drop-shadow(0 0 68px rgba(148, 175, 248, 0.45)) !important;
      animation: none;
    }
    .chakra:active .btn-img {
      filter: drop-shadow(0 0 5px rgba(130, 158, 235, 0.28)) !important;
      animation: none;
    }
    .chakra .btn-label { color: #7a9bbe; }
    .chakra .btn-desc  { color: #8fa9bf; }

    /* ══════════════════════════════
       卡片三：貓咪的房間
       暖金色 glow
    ══════════════════════════════ */
    .room .btn-img {
      animation: roomBreath 4.8s ease-in-out infinite 0.9s;
    }
    @keyframes roomBreath {
      0%, 100% {
        filter:
          drop-shadow(0 0 10px rgba(200, 165, 100, 0.38))
          drop-shadow(0 0 26px rgba(180, 145, 80, 0.18));
      }
      50% {
        filter:
          drop-shadow(0 0 22px rgba(220, 185, 115, 0.62))
          drop-shadow(0 0 52px rgba(200, 165, 95, 0.30));
      }
    }
    .room:hover .btn-img {
      filter:
        drop-shadow(0 0 26px rgba(230, 195, 125, 0.82))
        drop-shadow(0 0 65px rgba(210, 175, 105, 0.45)) !important;
      animation: none;
    }
    .room:active .btn-img {
      filter: drop-shadow(0 0 5px rgba(200, 165, 100, 0.28)) !important;
      animation: none;
    }
    .room .btn-label { color: #c9a876; }
    .room .btn-desc  { color: #9b8b6a; }

    /* ══════════════════════════════
       卡片四：內在空間
       粉紫色 glow
    ══════════════════════════════ */
    .space .btn-img {
      animation: spaceBreath 4.5s ease-in-out infinite 2.5s;
    }
    @keyframes spaceBreath {
      0%, 100% {
        filter:
          drop-shadow(0 0 10px rgba(190, 150, 230, 0.38))
          drop-shadow(0 0 26px rgba(160, 120, 210, 0.18));
      }
      50% {
        filter:
          drop-shadow(0 0 22px rgba(210, 170, 245, 0.62))
          drop-shadow(0 0 52px rgba(180, 140, 225, 0.30));
      }
    }
    .space:hover .btn-img {
      filter:
        drop-shadow(0 0 26px rgba(220, 180, 255, 0.82))
        drop-shadow(0 0 65px rgba(195, 155, 240, 0.45)) !important;
      animation: none;
    }
    .space:active .btn-img {
      filter: drop-shadow(0 0 5px rgba(190, 150, 230, 0.28)) !important;
      animation: none;
    }
    .space .btn-label { color: #9882b5; }
    .space .btn-desc  { color: #9b8db5; }

    /* ── 底部小字 ── */
    .footer-note {
      margin-top: 3.5rem;
      font-size: 0.57rem;
      letter-spacing: 0.28em;
      color: #b5a9c9;
      text-align: center;
    }

    /* ── 淡出轉場 ── */
    .fade-out { animation: fadeOut 0.4s ease forwards; }
    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="star-field" id="starField"></div>

  <div class="content">

    <div class="hero">
      <div class="hero-title">每日色彩</div>
      <div class="hero-sub">選擇今天的探索方式</div>
    </div>

    <div class="entries">

      <a class="btn-entry blessing" href="daily-color.html">
        <img class="btn-img" src="fairy-wand.PNG" alt="接收你的祝福">
        <div class="btn-text">
          <div class="btn-label">接收你的祝福</div>
          <div class="btn-desc">抽一張顏色卡<br>讓今天有一個錨點</div>
        </div>
      </a>

      <a class="btn-entry chakra" href="chakra-cat.html">
        <img class="btn-img" src="heart.PNG" alt="身體正在說什麼">
        <div class="btn-text">
          <div class="btn-label">身體正在說什麼</div>
          <div class="btn-desc">點擊七個能量中心<br>觀察此刻的狀態</div>
        </div>
      </a>

      <a class="btn-entry room" href="cat-room.html">
        <img class="btn-img" src="cat-room-bg.png" alt="貓咪的房間">
        <div class="btn-text">
          <div class="btn-label">貓咪的房間</div>
          <div class="btn-desc">選兩個物件和一個顏色<br>用很輕的方式靠近自己</div>
        </div>
      </a>

    </div>

    <div class="footer-note">每一天都是一個重新開始的機會</div>


  </div>

<script>
  // ── 星空生成 ──
  const field = document.getElementById('starField');
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = (Math.random() * 1.8 + 0.4).toFixed(1);
    const op   = (Math.random() * 0.22 + 0.05).toFixed(2);
    s.style.cssText = [
      `width:${size}px`, `height:${size}px`,
      `top:${(Math.random()*100).toFixed(2)}%`,
      `left:${(Math.random()*100).toFixed(2)}%`,
      `--dur:${(Math.random()*3 + 2.5).toFixed(1)}s`,
      `--delay:-${(Math.random()*5).toFixed(1)}s`,
      `--op:${op}`
    ].join(';');
    field.appendChild(s);
  }

  // ── PWA Service Worker ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // ── LIFF 初始化 ──
  initLiff();

  // ── 點擊淡出轉場 ──
  document.querySelectorAll('.btn-entry').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      const href = this.getAttribute('href');
      document.body.classList.add('fade-out');
      setTimeout(() => { window.location.href = href; }, 390);
    });
  });
</script>
</body>
</html>
