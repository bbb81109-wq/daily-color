<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Anmita Riga 宇宙訊號</title>
  <meta name="description" content="透過色彩、脈輪和物件，發現內在的靜謐角落。Anmita Riga 宇宙訊號 - 每日祝福、脈輪貓、聽見身體">
  <meta property="og:title" content="Anmita Riga 宇宙訊號">
  <meta property="og:description" content="透過色彩、脈輪和物件，發現內在的靜謐角落">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://euphonious-lebkuchen-60376f.netlify.app/icon-512.png">
  <meta property="og:locale" content="zh_TW">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Anmita Riga 宇宙訊號">
  <meta name="twitter:description" content="透過色彩、脈輪和物件，發現內在的靜謐角落">
  <meta name="theme-color" content="#F5F3F8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="宇宙訊號">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="liff.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #F9F6FD 0%, #FDF8F0 40%, #F4F0FB 75%, #FCF8FD 100%);
      font-family: "Noto Serif TC", Georgia, serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.8rem 5rem;
      color: #5A4A6A;
      overflow-x: hidden;
      position: relative;
    }

    /* 柔和背景光暈 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 700px 450px at 15% 20%, rgba(201,180,232,0.13) 0%, transparent 55%),
        radial-gradient(ellipse 600px 400px at 85% 30%, rgba(245,233,168,0.10) 0%, transparent 50%),
        radial-gradient(ellipse 650px 400px at 50% 90%, rgba(213,224,242,0.10) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .hero {
      text-align: center;
      margin-bottom: 5rem;
      padding-top: 2rem;
    }

    .hero-title {
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #5A4A6A;
      margin-bottom: 0.4rem;
      line-height: 1.4;
    }

    .hero-sub {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      color: #9A88B8;
      line-height: 1.8;
      font-weight: 300;
    }

    /* 軌道系統 */
    .orbital-system {
      position: relative;
      width: 420px;
      height: 420px;
      margin: 0 auto 4rem;
    }

    /* 軌道線 */
    .orbital-track {
      position: absolute;
      inset: 0;
      border: 1px dashed rgba(180, 155, 210, 0.3);
      border-radius: 50%;
      animation: orbitSpin 45s linear infinite reverse;
    }

    @keyframes orbitSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* 行星容器 */
    .entries {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-entry {
      position: absolute;
      width: 140px;
      height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      cursor: pointer;
      gap: 0;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      -webkit-tap-highlight-color: transparent;
      padding: 2rem 1.2rem;
    }

    .btn-entry:hover { transform: scale(1.1); }
    .btn-entry:active { transform: scale(0.95); transition-duration: 0.1s; }

    /* ── 軌道行星位置（4顆）── */
    .chakra {
      top: 0; left: 50%;
      animation: planetFloat-1 4.5s ease-in-out infinite;
    }
    .room {
      top: 50%; right: 0;
      animation: planetFloat-3 4.2s ease-in-out infinite;
    }
    .exhibition {
      bottom: 0; left: 50%;
      animation: planetFloat-2 4.7s ease-in-out infinite;
    }
    .aura-orbit {
      top: 50%; left: 0;
      animation: planetFloat-4 4s ease-in-out infinite;
    }

    @keyframes planetFloat-1 {
      0%, 100% { transform: translateX(-50%) translateY(0px); }
      50% { transform: translateX(-50%) translateY(-7px); }
    }
    @keyframes planetFloat-2 {
      0%, 100% { transform: translateX(-50%) translateY(0px); }
      50% { transform: translateX(-50%) translateY(7px); }
    }
    @keyframes planetFloat-3 {
      0%, 100% { transform: translateY(-50%) translateX(0px); }
      50% { transform: translateY(-50%) translateX(-7px); }
    }
    @keyframes planetFloat-4 {
      0%, 100% { transform: translateY(-50%) translateX(0px); }
      50% { transform: translateY(-50%) translateX(7px); }
    }

    /* 軌道行星視覺 */
    .btn-visual {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-bottom: 0.65rem;
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative;
      flex-shrink: 0;
    }
    .btn-entry:hover .btn-visual { transform: scale(1.12); }

    /* 發光球體顏色 — Girly 紫系 */
    .chakra .btn-visual {
      background: radial-gradient(circle at 42% 38%, rgba(248,244,255,0.95), rgba(201,180,232,0.75) 55%, rgba(170,140,215,0.55));
      box-shadow: 0 0 22px rgba(201,180,232,0.55), 0 0 48px rgba(201,180,232,0.22);
    }
    .chakra:hover .btn-visual {
      box-shadow: 0 0 32px rgba(201,180,232,0.75), 0 0 64px rgba(201,180,232,0.38);
    }
    .room .btn-visual {
      background: radial-gradient(circle at 42% 38%, rgba(240,245,255,0.95), rgba(213,224,242,0.8) 55%, rgba(175,195,230,0.55));
      box-shadow: 0 0 22px rgba(213,224,242,0.6), 0 0 48px rgba(213,224,242,0.25);
    }
    .room:hover .btn-visual {
      box-shadow: 0 0 32px rgba(213,224,242,0.8), 0 0 64px rgba(213,224,242,0.38);
    }
    .exhibition .btn-visual {
      background: radial-gradient(circle at 42% 38%, rgba(255,245,250,0.95), rgba(242,195,220,0.78) 55%, rgba(220,160,195,0.55));
      box-shadow: 0 0 22px rgba(242,195,220,0.55), 0 0 48px rgba(242,195,220,0.22);
    }
    .exhibition:hover .btn-visual {
      box-shadow: 0 0 32px rgba(242,195,220,0.75), 0 0 64px rgba(242,195,220,0.38);
    }
    .aura-orbit .btn-visual {
      background: radial-gradient(circle at 42% 38%, rgba(215,200,245,0.9), rgba(165,135,220,0.75) 55%, rgba(120,90,185,0.6));
      box-shadow: 0 0 22px rgba(165,135,220,0.55), 0 0 48px rgba(165,135,220,0.25);
    }
    .aura-orbit:hover .btn-visual {
      box-shadow: 0 0 32px rgba(165,135,220,0.75), 0 0 64px rgba(165,135,220,0.38);
    }

    /* 行星文字 */
    .btn-text { text-align: center; }
    .btn-label {
      font-size: 0.75rem; font-weight: 300;
      letter-spacing: 0.1em; color: #7A68A0; line-height: 1.4;
    }
    .btn-desc { display: none; }
    .btn-symbol { display: none; }

    /* ── 中心主星：接收祝福 ── */
    .blessing-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: flex; flex-direction: column; align-items: center;
      text-decoration: none; z-index: 2;
      -webkit-tap-highlight-color: transparent;
      animation: blessingPulse 5s ease-in-out infinite;
    }
    @keyframes blessingPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -52%) scale(1.03); }
    }
    .blessing-center:hover { animation: none; transform: translate(-50%, -50%) scale(1.08); }
    .blessing-center:active { transform: translate(-50%, -50%) scale(0.95); }

    .blessing-orb {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 36%, rgba(255,250,235,0.98), rgba(245,233,168,0.85) 48%, rgba(225,205,120,0.65));
      box-shadow:
        0 0 22px rgba(235,215,120,0.52),
        0 0 52px rgba(235,210,110,0.26),
        0 0 80px rgba(225,200,100,0.12);
      margin-bottom: 0.7rem; position: relative;
      transition: all 0.5s ease;
    }
    .blessing-orb::before {
      content: ''; position: absolute; inset: -8px;
      border-radius: 50%;
      border: 1px dashed rgba(225,205,130,0.42);
      animation: blessingRing 8s linear infinite;
    }
    .blessing-orb::after {
      content: ''; position: absolute; inset: -18px;
      border-radius: 50%;
      border: 1px dashed rgba(201,180,232,0.22);
      animation: blessingRing 12s linear infinite reverse;
    }
    @keyframes blessingRing {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .blessing-center:hover .blessing-orb {
      box-shadow:
        0 0 30px rgba(235,215,120,0.7),
        0 0 65px rgba(235,210,110,0.38),
        0 0 100px rgba(201,180,232,0.18);
    }
    .blessing-symbol { display: none; }
    .blessing-title {
      font-size: 0.88rem; font-weight: 400;
      letter-spacing: 0.12em; color: #6A5280;
      text-align: center; line-height: 1.5;
      font-family: "Noto Serif TC", serif;
    }
    .blessing-sub {
      font-size: 0.62rem; letter-spacing: 0.1em;
      color: #9A88B8; font-weight: 300; margin-top: 0.15rem;
      font-family: "Noto Serif TC", serif;
    }

    /* 底部標語 */
    .footer-note {
      margin-top: 3rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: #B0A0C8;
      text-align: center;
      font-weight: 300;
      line-height: 1.8;
    }

    .fade-out { animation: fadeOut 0.45s cubic-bezier(0.4,0,1,1) forwards; }
    @keyframes fadeOut {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(0.97); }
    }

    /* 頁面進入動畫 */
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 響應式 */
    @media (max-width: 480px) {
      body { padding: 3rem 1.5rem 4rem; }
      .hero { margin-bottom: 3rem; }
      .hero-title { font-size: 1.5rem; }
      .orbital-system { width: 300px; height: 300px; margin-bottom: 3rem; }
      .btn-entry { width: 90px; padding: 1rem 0.6rem; }
      .btn-visual { width: 68px; height: 68px; margin-bottom: 0.5rem; }
      .btn-symbol { font-size: 1.4rem; }
      .btn-label { font-size: 0.68rem; }
      .blessing-orb { width: 88px; height: 88px; }
      .blessing-symbol { font-size: 2rem; }
      .blessing-title { font-size: 0.78rem; }
    }
  </style>
</head>
<body>

  <div class="content">

    <div class="hero">
      <div class="hero-title">Anmita Riga</div>
      <div class="hero-sub">宇 宙 訊 號</div>
    </div>

    <div class="orbital-system">
      <div class="orbital-track"></div>

      <!-- 4 顆軌道行星 -->
      <div class="entries">

        <a class='btn-entry chakra' href='/chakra-cat'>
          <div class="btn-visual">

          </div>
          <div class="btn-text">
            <div class="btn-label">覺察能量</div>
          </div>
        </a>

        <a class='btn-entry room' href='/cat-room'>
          <div class="btn-visual"></div>
          <div class="btn-text">
            <div class="btn-label">聽見身體</div>
          </div>
        </a>

        <a class='btn-entry exhibition' href='https://energy-works.vercel.app' target='_blank' rel='noopener'>
          <div class="btn-visual"></div>
          <div class="btn-text">
            <div class="btn-label">能量創作</div>
          </div>
        </a>

        <a class='btn-entry aura-orbit' href='/aura'>
          <div class="btn-visual"></div>
          <div class="btn-text">
            <div class="btn-label">能量光場</div>
          </div>
        </a>

      </div>

      <!-- 中心主星：接收祝福 -->
      <a class="blessing-center" href="/daily-color">
        <div class="blessing-orb"></div>
        <div class="blessing-title">接收祝福</div>
        <div class="blessing-sub">今日色彩訊息</div>
      </a>

    </div>

    <div class="footer-note">每一刻都是一個重新開始的機會</div>

  </div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  initLiff();

  document.querySelectorAll('.btn-entry, .blessing-center').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      const href = this.getAttribute('href');
      document.body.classList.add('fade-out');
      setTimeout(() => { window.location.href = href; }, 490);
    });
  });
</script>
</body>
</html>
