<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>今日祝福 | Anmita Riga</title>
  <meta name="description" content="每日祝福 - 透過色彩和脈輪，感受宇宙給你的訊息。輕輕地抽一張，看看今天該怎麼活著。">
  <meta name="theme-color" content="#faf9ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="每日色彩">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="liff.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #faf8ff 0%, #f7f4ff 50%, #fff8f5 100%);
      transition: background 1.6s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: "Noto Serif TC", Georgia, serif;
      font-weight: 300;
      padding: 4rem 1.5rem 6rem;
      color: #3d3556;
      overflow-x: hidden;
      position: relative;
    }

    /* 背景柔和流動 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 700px 400px at 25% 25%, rgba(255, 182, 193, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse 600px 350px at 75% 20%, rgba(147, 112, 219, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse 650px 380px at 80% 80%, rgba(135, 206, 235, 0.09) 0%, transparent 50%),
        radial-gradient(ellipse 700px 400px at 20% 75%, rgba(255, 215, 100, 0.08) 0%, transparent 50%);
      pointer-events: none;
      animation: none;
      z-index: 0;
    }
    @keyframes ambient {
      0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
      25%       { transform: translate(-3%, 2%) scale(1.08) rotate(5deg); }
      50%       { transform: translate(2%, -2%) scale(1.04) rotate(0deg); }
      75%       { transform: translate(-2%, -3%) scale(1.06) rotate(-5deg); }
    }

    /* ── 返回 ── */
    .back-link {
      position: fixed;
      top: 1.2rem; left: 1.4rem;
      font-size: 0.82rem;
      letter-spacing: 0.2em;
      color: #6b5b95;
      text-decoration: none;
      transition: all 0.3s ease;
      z-index: 10;
      font-weight: 500;
      opacity: 0.9;
    }
    .back-link:hover {
      color: #5a4a7a;
      transform: translateX(-4px);
      opacity: 1;
    }

    /* ── 底部回首頁鏈接 ── */
    .footer-home-link {
      display: inline-block;
      margin-top: 3rem;
      margin-bottom: 2rem;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: #b5a9c9;
      text-decoration: none;
      transition: all 0.3s ease;
      font-weight: 400;
      opacity: 0.7;
    }
    .footer-home-link:hover {
      color: #6b5b95;
      opacity: 1;
      transform: translateY(-2px);
    }

    /* ── 標題 ── */
    .headline {
      font-size: 1.06rem;
      color: #5a4a7a;
      letter-spacing: 0.15em;
      font-weight: 400;
      text-align: center;
      margin-bottom: 1.4rem;
      position: relative;
      z-index: 1;
      line-height: 1.9;
    }

    /* ── 抽牌按鈕 ── */
    .draw-btn {
      background: linear-gradient(135deg, rgba(147,112,219,0.12) 0%, rgba(200,180,255,0.08) 100%);
      border: 1.5px solid rgba(147,112,219,0.35);
      color: #6b5b95;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      padding: 0.75rem 2.6rem;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 2.4rem;
      position: relative;
      z-index: 1;
      box-shadow: 0 4px 15px rgba(147,112,219,0.08);
    }
    .draw-btn:hover {
      background: linear-gradient(135deg, rgba(147,112,219,0.22) 0%, rgba(200,180,255,0.15) 100%);
      border-color: rgba(147,112,219,0.55);
      color: #5a4a7a;
      box-shadow: 0 6px 20px rgba(147,112,219,0.15);
      transform: translateY(-2px);
    }
    .draw-btn:active { transform: scale(0.98); }
    .draw-btn.gone   { opacity: 0; pointer-events: none; transform: translateY(-6px); }

    /* ════════════════════════════════════════
       卡片區域
    ════════════════════════════════════════ */
    .cards-area {
      width: 100%;
      max-width: 220px;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
      position: relative;
      z-index: 1;
      margin: 0 auto;
    }

    /* ── 初始背面卡片 ── */
    .back-scene {
      transition: opacity 0.38s ease;
      cursor: pointer;
      perspective: 1200px;
    }
    .back-scene.fading { opacity: 0; pointer-events: none; }

    .back-card {
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(147,112,219,0.12), 0 4px 12px rgba(0,0,0,0.08);
      position: relative;
      overflow: hidden;
      animation: card-breathe 3.8s ease-in-out infinite;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55), box-shadow 0.3s ease;
    }
    .back-card:hover {
      box-shadow: 0 16px 48px rgba(147,112,219,0.18), 0 6px 16px rgba(0,0,0,0.12);
    }
    .back-card.flipping {
      animation: none;
    }
    @keyframes card-breathe {
      0%, 100% { transform: scale(1);     box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 0 0 rgba(180,150,220,0); }
      50%       { transform: scale(1.013); box-shadow: 0 12px 40px rgba(0,0,0,0.22), 0 0 28px rgba(180,150,220,0.18); }
    }
    .back-card img {
      width: 100%;
      display: block;
      border-radius: 20px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .back-hint {
      position: absolute;
      bottom: 1.4rem;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.56rem;
      letter-spacing: 0.36em;
      color: rgba(255,255,255,0.65);
      animation: none;
      pointer-events: none;
      transition: all 0.3s ease;
      line-height: 1.8;
    }
    @keyframes hint-pulse {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1; }
    }
    .back-card:hover .back-hint {
      opacity: 1;
      font-size: 0.62rem;
      letter-spacing: 0.4em;
    }

    /* 點擊光暈 */
    .halo-ring {
      position: absolute;
      top: 50%; left: 50%;
      width: 80px; height: 80px;
      margin: -40px 0 0 -40px;
      border-radius: 50%;
      border: 1.5px solid rgba(180,155,225,0.55);
      pointer-events: none;
      animation: halo-out 0.7s ease-out forwards;
      z-index: 3;
    }
    @keyframes halo-out {
      0%   { transform: scale(0.8); opacity: 0.9; }
      100% { transform: scale(4.5); opacity: 0; }
    }

    /* ════════════════════════════════════════
       第一張卡：直覺祝福
    ════════════════════════════════════════ */
    .ic-wrap {
      border-radius: 24px;
      padding: 2.8rem 2.4rem 2.6rem;
      box-shadow: 0 8px 28px rgba(147,112,219,0.1), 0 2px 8px rgba(0,0,0,0.06);
      display: none;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.62s ease, transform 0.62s ease;
      position: relative;
      overflow: hidden;
    }
    .ic-wrap.appear { opacity: 1; transform: translateY(0); }

    /* 頂部裝飾細線 */
    .ic-strip {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      opacity: 0.45;
    }

    .ic-label {
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      color: #9b8db5;
      text-align: center;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      font-weight: 600;
    }
    .ic-text {
      font-size: 1.42rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      line-height: 2.2;
      text-align: center;
      color: #3d3556;
      white-space: pre-line;
      padding: 0 1rem;
    }

    /* ════════════════════════════════════════
       第二張卡：脈輪卡（3D 翻轉）
    ════════════════════════════════════════ */
    .ck-scene {
      display: none;
      position: relative;
    }
    .ck-scene.active { display: block; }

    /* 粒子層 */
    .particle-field {
      position: absolute;
      inset: -50px;
      pointer-events: none;
      overflow: visible;
      z-index: 5;
    }
    .card-particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: particle-drift linear forwards;
    }
    @keyframes particle-drift {
      0%   { opacity: 0.8; transform: translate(0, 0) scale(1); }
      20%  { opacity: 1; }
      100% { opacity: 0;  transform: translate(var(--dx), var(--dy)) scale(0.15); }
    }

    /* 3D 場景 */
    .ck-3d-scene { width: 100%; }
    .ck-3d {
      width: 100%;
      position: relative;
      min-height: 420px;
    }

    /* 通用面 */
    .ck-face {
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
    }

    /* 背面（結果卡片區） */
    .ck-back {
      min-height: 420px;
      background: linear-gradient(180deg, #fefefc 0%, #fdfbf9 100%);
      box-shadow: 0 8px 28px rgba(147,112,219,0.08), inset 0 1px 0 rgba(255,255,255,0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 2.4rem 2rem;
      border-radius: 24px;
      opacity: 1;
      transition: opacity 0.6s ease;
      z-index: 1;
    }
    .ck-back.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .ck-back::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(147,112,219,0.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(200,180,255,0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* 初始提示狀態 */
    .ck-back-hint {
      position: relative;
      z-index: 1;
      text-align: center;
      font-size: 0.9rem;
      line-height: 1.8;
      color: #9b8db5;
      font-weight: 300;
      letter-spacing: 0.05em;
      transition: opacity 0.5s ease;
    }

    .ck-back-hint-icon {
      font-size: 2.4rem;
      margin-bottom: 1rem;
      opacity: 0.6;
      animation: none;
    }

    @keyframes hint-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* ════════════════════════════════════════
       重設計：5 層資訊結構
    ════════════════════════════════════════ */

    .ck-back-content {
      position: relative;
      z-index: 1;
      text-align: center;
      width: 100%;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.5s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 0 1rem;
    }

    .ck-back-content.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* 第一層：訊息類別 */
    .ck-layer-1 {
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      color: #9b8db5;
      text-transform: uppercase;
      font-weight: 600;
      opacity: 0.8;
    }

    /* 第二層：卡牌名稱（最大標題） */
    .ck-layer-2 {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .ck-back-card-icon {
      font-size: 2.6rem;
      opacity: 0.9;
    }

    .ck-back-card-title {
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #3d3556;
      line-height: 1.4;
      max-width: 220px;
    }

    /* 第三層：核心訊息（主內容） */
    .ck-layer-3 {
      font-size: 1.04rem;
      line-height: 2.1;
      letter-spacing: 0.02em;
      color: #5a4a7a;
      max-width: 300px;
      font-weight: 400;
    }

    /* 第四層：行動建議 */
    .ck-layer-4 {
      width: 100%;
      max-width: 220px;
    }

    .ck-back-card-action {
      font-size: 0.96rem;
      line-height: 1.95;
      letter-spacing: 0.01em;
      color: #6b5b95;
      padding: 1rem 1.2rem;
      background: rgba(220,200,255,0.1);
      border-left: 3px solid rgba(147,112,219,0.3);
      border-radius: 8px;
      text-align: left;
    }

    /* 第五層：自我提問 */
    .ck-layer-5 {
      font-size: 0.88rem;
      line-height: 1.9;
      letter-spacing: 0.01em;
      color: #8A7A8A;
      font-style: italic;
      font-weight: 300;
      max-width: 220px;
      opacity: 0.85;
    }

    /* 隱藏舊的不用樣式 */
    .ck-back-card-action-label {
      display: none;
    }

    /* 舊的動畫元素隱藏 */
    .ck-back-aura,
    .ck-back-symbol {
      display: none;
    }
    .ck-back-strip {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #e8b4c0, #d4b8cc, #b8acd4, #a8c4d8, #b8d4c0);
      opacity: 0.55;
    }

    /* 正面 */
    .ck-front {
      position: absolute;
      top: 0; left: 0; right: 0;
      width: 100%;
      min-height: 420px;
      background: linear-gradient(180deg, #fefefc 0%, #fdfbf9 100%);
      box-shadow: 0 8px 28px rgba(147,112,219,0.08), inset 0 1px 0 rgba(255,255,255,0.8);
      overflow: hidden;
      border-radius: 24px;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
      z-index: 2;
    }
    .ck-front.visible {
      opacity: 1;
      pointer-events: all;
    }

    .ck-front::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 25% 35%, rgba(147,112,219,0.05) 0%, transparent 50%),
        radial-gradient(circle at 75% 65%, rgba(200,180,255,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* 正面內容 */
    .ck-strip {
      height: 3px;
      transition: background 0.7s ease;
      position: relative;
      z-index: 2;
    }
    .ck-body {
      padding: 1.8rem 1.8rem 1.7rem;
      position: relative;
      z-index: 1;
    }

    .ck-meta {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin-bottom: 1.5rem;
    }
    .ck-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.7s ease;
    }
    .ck-name-wrap {}
    .ck-name {
      font-size: 1.28rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: #5a4a7a;
      line-height: 1.5;
      margin-bottom: 0.4rem;
    }
    .ck-en {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      color: #a89bc3;
      margin-top: 0.3rem;
      font-style: italic;
      font-weight: 300;
    }

    .ck-element-location {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      color: #9b8db5;
      margin-top: 0.8rem;
      margin-bottom: 1rem;
      font-weight: 400;
      padding: 0.6rem 1rem;
      background: rgba(147,112,219,0.08);
      border-radius: 12px;
      display: inline-block;
    }

    .ck-blessing {
      font-size: 1.32rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      line-height: 2.25;
      text-align: center;
      color: #3d3556;
      margin-bottom: 1.8rem;
      white-space: pre-line;
      padding: 0 0.6rem;
    }
    .ck-rule {
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(147,112,219,0.3), transparent);
      margin: 1.3rem 0;
    }
    .ck-action-label {
      font-size: 0.64rem;
      letter-spacing: 0.28em;
      color: #9b8db5;
      margin-bottom: 0.7rem;
      text-transform: uppercase;
      font-weight: 600;
    }
    .ck-action {
      font-size: 0.95rem;
      line-height: 1.95;
      letter-spacing: 0.02em;
      color: #5a4a7a;
      padding: 1rem 1.2rem;
      background: linear-gradient(135deg, rgba(220,200,255,0.18) 0%, rgba(200,180,255,0.1) 100%);
      border-left: 3px solid rgba(147,112,219,0.35);
      border-radius: 10px;
    }

    /* 深度理解 & 轉化方向 */
    .ck-deeper-section {
      margin-top: 1.5rem;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity 0.5s ease, max-height 0.5s ease;
    }
    .ck-deeper-section.visible {
      opacity: 1;
      max-height: 500px;
    }
    .ck-deeper-label {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: #9b8db5;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .ck-deeper-text {
      font-size: 0.92rem;
      line-height: 2;
      letter-spacing: 0.02em;
      color: #5a4a7a;
      padding: 1rem 1.1rem;
      background: linear-gradient(135deg, rgba(147,112,219,0.1) 0%, rgba(180,160,240,0.06) 100%);
      border-radius: 10px;
      margin-bottom: 1.2rem;
    }
    .ck-transform {
      font-size: 0.92rem;
      line-height: 2;
      letter-spacing: 0.02em;
      color: #6b5b95;
      padding: 1rem 1.2rem;
      background: linear-gradient(135deg, rgba(220,200,255,0.12) 0%, rgba(200,180,255,0.08) 100%);
      border-left: 3px solid rgba(147,112,219,0.3);
      border-radius: 10px;
      font-style: italic;
      font-weight: 300;
    }

    /* 按鈕 "更多" */
    .ck-expand-btn {
      display: inline-block;
      margin-top: 0.8rem;
      background: transparent;
      border: 1px solid rgba(147,112,219,0.3);
      color: #9b8db5;
      font-family: inherit;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      padding: 0.45rem 1rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.25s;
    }
    .ck-expand-btn:hover {
      background: rgba(147,112,219,0.1);
      border-color: rgba(147,112,219,0.5);
    }
    /* 次要按鈕：分享 */
    .ck-share {
      display: inline-block;
      width: fit-content;
      margin: 0 0.5rem 0 0.5rem;
      background: transparent;
      border: 1px solid rgba(147,112,219,0.2);
      color: #9b8db5;
      font-family: inherit;
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      padding: 0.5rem 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 400;
    }
    .ck-share:hover {
      background: rgba(147,112,219,0.08);
      border-color: rgba(147,112,219,0.4);
      color: #6b5b95;
    }

    /* LINE 按鈕特色 */
    .ck-share.line-btn {
      border-color: #06C755;
      color: #06C755;
      background: transparent;
    }
    .ck-share.line-btn:hover {
      background: rgba(6,199,85,0.1);
      border-color: #06C755;
      color: #06C755;
    }

    /* 最低優先：進入房間 */
    #roomBtn {
      opacity: 0.7;
    }
    #roomBtn:hover {
      opacity: 1;
    }

    /* ── LINE 個人化問候 ── */
    .line-greeting {
      font-size: 0.72rem;
      letter-spacing: 0.24em;
      color: #8A7A8A;
      text-align: center;
      margin-bottom: 0.6rem;
      min-height: 1.4em;
      position: relative;
      z-index: 1;
      font-weight: 400;
    }

    /* 文字淡入上浮 */
    .ta {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.52s ease, transform 0.52s ease;
    }
    .ta.in { opacity: 1; transform: translateY(0); }

    /* ── 換一張按鈕 ── */
    /* ════════════════════════════════════════
       按鈕層級（主 > 次 > 最低）
    ════════════════════════════════════════ */

    /* 主要按鈕：再抽一張 */
    .redraw-btn {
      display: block;
      margin: 2.8rem auto 2rem;
      background: linear-gradient(135deg, rgba(147,112,219,0.22) 0%, rgba(180,160,240,0.15) 100%);
      border: 2px solid rgba(147,112,219,0.45);
      color: #5a4a7a;
      font-family: inherit;

function pageTint(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const base = [245,243,239];
  const t = 0.88;
  return `rgb(${Math.round(r+(base[0]-r)*t)},${Math.round(g+(base[1]-g)*t)},${Math.round(b+(base[2]-b)*t)})`;
}
function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function formatDate() {
  const d = new Date();
  const days = ['日','一','二','三','四','五','六'];
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} 星期${days[d.getDay()]}`;
}

// IG 圖片生成
function generateIGImage(ic, ck) {
  const SIZE = 1080;
  const cv   = document.createElement('canvas');
  cv.width = cv.height = SIZE;
  const c = cv.getContext('2d');
  // 背景
  c.fillStyle = pageTint(ck.color);
  c.fillRect(0, 0, SIZE, SIZE);
  const halo = c.createRadialGradient(SIZE/2, SIZE/2, 0, SIZE/2, SIZE/2, SIZE*0.55);
  halo.addColorStop(0, hexAlpha(ck.color, 0.16));
  halo.addColorStop(1, 'rgba(0,0,0,0)');
  c.fillStyle = halo; c.fillRect(0, 0, SIZE, SIZE);
  // 色條
  c.fillStyle = ck.color; c.globalAlpha = 0.7; c.fillRect(0, 0, SIZE, 8);
  c.globalAlpha = 1;
  // 裝飾圓環
  c.strokeStyle = hexAlpha(ck.color, 0.1); c.lineWidth = 1;
  [260, 320, 380].forEach(r => {
    c.beginPath(); c.arc(SIZE/2, SIZE/2, r, 0, Math.PI*2); c.stroke();
  });
  // 直覺文字（大）
  c.font = '300 52px "Noto Serif TC", serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillStyle = '#2e2a26';
  const icLines = ic.text.split('\n');
  icLines.forEach((line, i) => {
    c.fillText(line, SIZE/2, 330 + (i - (icLines.length-1)/2) * 72);
  });
  // 分隔
  const g = c.createLinearGradient(SIZE/2-80, 440, SIZE/2+80, 440);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(0.5, hexAlpha(ck.color, 0.35));
  g.addColorStop(1, 'rgba(0,0,0,0)');
  c.strokeStyle = g; c.lineWidth = 1;
  c.beginPath(); c.moveTo(SIZE/2-80, 440); c.lineTo(SIZE/2+80, 440); c.stroke();
  // 脈輪名
  c.font = '300 26px "Noto Serif TC", serif';
  c.fillStyle = hexAlpha(ck.color, 0.75);
  c.fillText(`${ck.name}  ·  ${ck.en}`, SIZE/2, 490);
  // 脈輪祝福
  c.font = '400 48px "Noto Serif TC", serif';
  c.fillStyle = '#2e2a26';
  c.shadowColor = hexAlpha(ck.color, 0.2); c.shadowBlur = 22;
  const ckLines = ck.blessing.split('\n');
  ckLines.forEach((line, i) => {
    c.fillText(line, SIZE/2, 610 + (i - (ckLines.length-1)/2) * 64);
  });
  c.shadowBlur = 0;
  // 底部
  c.font = '200 20px "Noto Serif TC", serif';
  c.fillStyle = hexAlpha(ck.color, 0.45);
  c.fillText('今  日  祝  福', SIZE/2, 980);
  c.fillStyle = 'rgba(46,42,38,0.22)';
  c.fillText(formatDate(), SIZE/2, 1018);
  return cv;
}

// ── 粒子 ──
function spawnParticles(color) {
  const r = parseInt(color.slice(1,3),16);
  const g = parseInt(color.slice(3,5),16);
  const b = parseInt(color.slice(5,7),16);
  const palette = [
    `rgba(${r},${g},${b},0.5)`,
    'rgba(200,175,240,0.42)',
    'rgba(240,190,210,0.38)',
    'rgba(175,210,240,0.38)',
  ];
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'card-particle';
    const size  = 2 + Math.random() * 4;
    const angle = Math.random() * Math.PI * 2;
    const dist  = 55 + Math.random() * 100;
    const dur   = 2.2 + Math.random() * 2.4;
    p.style.width  = size + 'px';
    p.style.height = size + 'px';
    p.style.left = `calc(50% + ${(Math.random()-0.5)*50}px)`;
    p.style.top  = `calc(50% + ${(Math.random()-0.5)*70}px)`;
    p.style.background = palette[Math.floor(Math.random()*palette.length)];
    p.style.setProperty('--dx', (Math.cos(angle)*dist) + 'px');
    p.style.setProperty('--dy', (Math.sin(angle)*dist - 18) + 'px');
    p.style.animationDuration = dur + 's';
    particleField.appendChild(p);
    setTimeout(() => p.remove(), dur * 1000);
  }
}

  const tintColor = pageTint(cardColor);
  document.body.style.backgroundColor = tintColor;
  document.body.style.backgroundImage = `radial-gradient(ellipse 60% 50% at 50% 40%, ${hexAlpha(cardColor, 0.12)} 0%, transparent 70%)`;
  ckScene.classList.add('active');

  setTimeout(() => {
    // 顯示結果卡片（延遲隱藏提示）
    showResultCard(true);
    // spawnParticles(cardColor); // 禁用粒子效果

    // 延遲 1.5 秒才翻卡，確保用戶看到結果卡片內容
    setTimeout(() => {
      flipCKIn();
    }, 1500);
  }, 900);

  // 換一張按鈕（延遲時間 = 900 + 1500 + 750(翻卡動畫)）
  setTimeout(() => {
    redrawBtn.classList.add('visible');
    state = 'shown';
  }, 3150);
}

// ── 抽牌觸發 ──
function handleDraw() {
  if (state !== 'idle') return;
  state = 'animating';

  drawBtn.classList.add('gone');
  const backCard = backScene.querySelector('.back-card');
  spawnHalo(backCard);

  // 背面卡翻轉動畫 + 粒子
  backCard.classList.add('flipping');
  // spawnParticles('#b89ad8'); // 禁用粒子效果

  // 背面卡淡出
  setTimeout(() => {
    backScene.classList.add('fading');
  }, 150);
  setTimeout(() => { backScene.style.display = 'none'; }, 380);

  setTimeout(() => {
    showPair(pickPair());
  }, 280);
}

// ── 顯示結果卡片 ──
function showResultCard(delayHide = false) {
  const resultCard = RESULT_CARDS[Math.floor(Math.random() * RESULT_CARDS.length)];
  const hintEl = document.getElementById('ckBackHint');
  const contentEl = document.getElementById('ckBackContent');

  // 填充卡片內容
  document.getElementById('ckCardType').textContent = resultCard.type;
  document.getElementById('ckCardIcon').textContent = resultCard.icon;
  document.getElementById('ckCardTitle').textContent = resultCard.title;
  document.getElementById('ckCardDeeper').textContent = resultCard.deeper;
  document.getElementById('ckCardAction').textContent = resultCard.action;

  // 立即顯示內容（淡入）
  contentEl.classList.add('show');

  // 延遲隱藏提示（讓用戶先看到提示文字）
  if (delayHide) {
    setTimeout(() => {
      hintEl.style.opacity = '0';
      setTimeout(() => {
        hintEl.style.display = 'none';
        hintEl.style.opacity = '1';
      }, 500);
    }, 800);
  } else {
    // 立即隱藏提示
    hintEl.style.display = 'none';
  }
}

// ── 換一張 ──
function handleRedraw() {
  if (state !== 'shown') return;
  state = 'animating';

  redrawBtn.classList.remove('visible');

  // 卡1 淡出
  icWrap.classList.remove('appear');
  setTimeout(() => {
    icWrap.style.display = 'none';
  }, 650);

  // 卡2 翻回背面，然後顯示新的結果卡片
  flipCKOut(() => {
    // 清空舊的卡片
    const contentEl = document.getElementById('ckBackContent');
    contentEl.classList.remove('show');

    // 短暫停頓後顯示新卡片
    setTimeout(() => {
      showResultCard(false); // 立即隱藏提示，顯示新卡片
      // 重新翻轉回正面（顯示新卡片）
      flipCKIn();
      redrawBtn.classList.add('visible');
      state = 'shown';
    }, 400);
  });
}

drawBtn.addEventListener('click', handleDraw);
backScene.addEventListener('click', () => { if (state === 'idle') handleDraw(); });
redrawBtn.addEventListener('click', handleRedraw);

// ── 展開/收起深度理解 ──
document.getElementById('ckExpandBtn').addEventListener('click', function() {
  const deeperSection = document.getElementById('ckDeeperSection');
  const isVisible = deeperSection.classList.contains('visible');
  if (isVisible) {
    deeperSection.classList.remove('visible');
    this.textContent = '更多探索';
  } else {
    deeperSection.classList.add('visible');
    this.textContent = '收起';
  }
});

// ── 進入房間 ──
document.getElementById('roomBtn').addEventListener('click', function() {
  let chakra;

  if (currentCK) {
    // 已有脈輪卡，直接使用
    chakra = currentCK;
  } else if (currentIC && currentIC.chakra !== undefined) {
    // 直覺卡有脈輪關聯，使用關聯的脈輪卡
    chakra = CHAKRA_DATA[currentIC.chakra];
  } else {
    // 靈性指引卡，隨機選擇一個脈輪卡
    chakra = CHAKRA_DATA[Math.floor(Math.random() * CHAKRA_DATA.length)];
  }

  localStorage.setItem('todayChakra', JSON.stringify({
    name: chakra.name,
    en: chakra.en,
    color: chakra.color,
    timestamp: Date.now()
  }));
  window.location.href = 'cat-room.html';
});

// ── LINE 分享 ──
document.getElementById('ckShare').addEventListener('click', async function() {
  if (!currentIC) return;

  let chakra;
  if (currentCK) {
    chakra = currentCK;
  } else if (currentIC.chakra !== undefined) {
    chakra = CHAKRA_DATA[currentIC.chakra];
  } else {
    // 靈性指引卡，使用相關的脈輪卡
    chakra = CHAKRA_DATA[Math.floor(Math.random() * CHAKRA_DATA.length)];
  }

  const orig = this.textContent;
  this.textContent = '傳送中…';
  this.disabled = true;
  try {
    await shareToLine(buildBlessingFlexMessage(currentIC.text, chakra));
  } catch(e) {}
  this.textContent = orig;
  this.disabled = false;
});

// ── Instagram 限動保存 ──
document.getElementById('igBtn').addEventListener('click', function() {
  if (!currentIC) return;

  let chakra;
  if (currentCK) {
    chakra = currentCK;
  } else if (currentIC.chakra !== undefined) {
    chakra = CHAKRA_DATA[currentIC.chakra];
  } else {
    chakra = CHAKRA_DATA[Math.floor(Math.random() * CHAKRA_DATA.length)];
  }

  // 生成圖片
  const bgColor = currentCK ? currentCK.color : CHAKRA_DATA[currentIC.chakra].color;
  const imageData = generateInstagramImage(chakra.name, currentIC.text, bgColor);

  // 下載圖片
  const link = document.createElement('a');
  link.href = imageData;
  link.download = `daily-color-${new Date().toISOString().slice(0, 10)}.png`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);

  // 提示用戶
  const orig = this.textContent;
  this.textContent = '已保存 ✓';
  setTimeout(() => {
    this.textContent = orig;
  }, 2000);
});

// ── LIFF 初始化 + 個人化問候 ──
(async () => {
  await initLiff();
  const user = getLiffUser();
  if (user && user.displayName) {
    const greet = document.getElementById('lineGreeting');
    if (greet) greet.textContent = `${user.displayName}，今天宇宙有話對你說`;
  }
})();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
</script>
