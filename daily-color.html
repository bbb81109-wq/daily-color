  <style>
    /* ── Design Tokens ── */
    :root {
      --ink-deepest: #FBF6EE;
      --ink-deep:    #F5EDE0;
      --gold:        #B8841E;
      --gold-soft:   #CFA040;
      --gold-line:   rgba(160, 110, 20, 0.40);
      --lavender:        #7A5AAA;
      --lavender-soft:   #9870C0;
      --quartz:      #3A7A9E;
      --text-primary:   #2C2018;
      --text-secondary: #4A3828;
      --text-muted:     #8A7060;
      --ease-silk: cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { background: #F4F3F6 !important; }

    body {
      min-height: 100vh;
      background: #F4F3F6;
      transition: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: "Noto Serif TC", Georgia, serif;
      font-weight: 300;
      padding: 4rem 1.5rem 6rem;
      color: var(--text-secondary);
      overflow-x: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    /* 淡雅光暈 */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 20%, rgba(180, 150, 220, 0.10) 0%, transparent 70%),
        radial-gradient(ellipse 60% 45% at 85% 75%, rgba(160, 200, 180, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after { display: none; }

    /* ── 返回行星按鈕 ── */
    .back-link {
      position: fixed;
      top: 1rem; left: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      z-index: 10;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      -webkit-tap-highlight-color: transparent;
    }
    .back-link::before {
      content: '';
      display: block;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #FAF0C0, #F0D898 55%, #E0C070);
      box-shadow: 0 3px 12px rgba(240, 216, 152, 0.5), 0 0 0 1px rgba(240, 216, 152, 0.3);
      flex-shrink: 0;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      animation: backPlanetFloat 4s ease-in-out infinite;
    }
    .back-link span {
      font-family: "Cormorant Garamond", serif;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      color: #8A7060;
      font-weight: 400;
      opacity: 0.85;
    }
    .back-link:hover::before {
      transform: scale(1.15);
      box-shadow: 0 5px 18px rgba(240, 216, 152, 0.7), 0 0 0 3px rgba(240, 216, 152, 0.2);
    }
    .back-link:hover span { opacity: 1; color: #6A5040; }

    @keyframes backPlanetFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
    }

    /* ── 底部回首頁行星按鈕 ── */
    .footer-home-link {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      margin-top: 3rem;
      margin-bottom: 2rem;
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      -webkit-tap-highlight-color: transparent;
    }
    .footer-home-link::before {
      content: '';
      display: block;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #FAF0C0, #F0D898 55%, #E0C070);
      box-shadow: 0 4px 16px rgba(240, 216, 152, 0.45), 0 0 0 1px rgba(240, 216, 152, 0.25);
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      animation: footerPlanetFloat 5s ease-in-out infinite;
    }
    .footer-home-link span {
      font-family: "Cormorant Garamond", serif;
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      color: #9A8070;
      font-weight: 400;
    }
    .footer-home-link:hover::before {
      transform: scale(1.12);
      box-shadow: 0 8px 24px rgba(240, 216, 152, 0.65), 0 0 0 3px rgba(240, 216, 152, 0.2);
    }
    .footer-home-link:hover span { color: #6A5040; }

    @keyframes footerPlanetFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }

    /* ── 標題 ── */
    .headline {
      font-size: 1rem;
      color: var(--text-secondary);
      letter-spacing: 0.18em;
      font-weight: 300;
      text-align: center;
      margin-bottom: 1.4rem;
      position: relative;
      z-index: 1;
      line-height: 2;
    }

    /* ── 抽牌按鈕 ── */
    /* 三選一塔羅提示 */
    .tarot-hint {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: #B0A0C8;
      text-align: center;
      margin-bottom: 2.2rem;
      font-weight: 300;
      animation: hint-pulse 3s ease-in-out infinite;
    }
    @keyframes hint-pulse {
      0%,100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* 扇形展開容器 */
    .tarot-spread {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 0;
      height: 260px;
      position: relative;
    }

    /* 單張牌 */
    .tarot-card {
      width: 110px;
      height: 175px;
      border-radius: 14px;
      background: linear-gradient(155deg, #EDE5F8 0%, #DDD0F2 40%, #C9B4E8 100%);
      border: 1px solid rgba(180,155,220,0.4);
      box-shadow: 0 8px 28px rgba(150,120,200,0.18), 0 2px 8px rgba(0,0,0,0.08);
      cursor: pointer;
      position: absolute;
      bottom: 0;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.4s cubic-bezier(0.23,1,0.32,1),
                  box-shadow 0.4s ease,
                  opacity 0.4s ease;
      transform-origin: bottom center;
      -webkit-tap-highlight-color: transparent;
    }
    .tc-left  { transform: rotate(-18deg) translateX(-60px); z-index: 1; }
    .tc-mid   { transform: rotate(0deg);                     z-index: 2; }
    .tc-right { transform: rotate(18deg)  translateX(60px);  z-index: 1; }

    .tarot-card:hover { box-shadow: 0 16px 44px rgba(150,120,200,0.32), 0 4px 12px rgba(0,0,0,0.12); }
    .tc-left:hover  { transform: rotate(-18deg) translateX(-60px) translateY(-18px) scale(1.06); }
    .tc-mid:hover   { transform: rotate(0deg)                     translateY(-18px) scale(1.06); }
    .tc-right:hover { transform: rotate(18deg)  translateX(60px)  translateY(-18px) scale(1.06); }

    .tarot-card.selected {
      transform: rotate(0deg) translateX(0) translateY(-24px) scale(1.1) !important;
      box-shadow: 0 24px 56px rgba(150,120,200,0.38), 0 6px 16px rgba(0,0,0,0.12);
      z-index: 10;
    }
    .tarot-card.fading-out {
      opacity: 0;
      transform: rotate(0deg) translateY(20px) scale(0.9) !important;
      pointer-events: none;
    }

    .tc-inner {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%;
      border-radius: 13px;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 8px,
        rgba(180,155,220,0.08) 8px,
        rgba(180,155,220,0.08) 9px
      );
    }
    .tc-symbol {
      font-size: 2rem;
      color: rgba(160,130,210,0.35);
      animation: symbol-breathe 4s ease-in-out infinite;
    }
    @keyframes symbol-breathe {
      0%,100% { opacity: 0.35; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.08); }
    }

    /* ════════════════════════════════════════
       卡片區域
    ════════════════════════════════════════ */
    .cards-area {
      width: 100%;
      max-width: 220px;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
      position: relative;
      z-index: 1;
      margin: 0 auto;
    }

    /* ── 初始背面卡片 ── */
    .back-scene {
      transition: opacity 0.38s ease;
      cursor: pointer;
      perspective: 1200px;
    }
    .back-scene.fading { opacity: 0; pointer-events: none; }

    .back-card {
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(147,112,219,0.12), 0 4px 12px rgba(0,0,0,0.08);
      position: relative;
      overflow: hidden;
      animation: card-breathe 3.8s ease-in-out infinite;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55), box-shadow 0.3s ease;
    }
    .back-card:hover {
      box-shadow: 0 16px 48px rgba(147,112,219,0.18), 0 6px 16px rgba(0,0,0,0.12);
    }
    .back-card.flipping {
      animation: none;
    }
    .back-card.loading {
      animation: card-breathe 2s ease-in-out infinite;
      cursor: not-allowed;
      opacity: 0.9;
    }
    .back-card.loading .back-hint {
      animation: breathing-loading 1.8s ease-in-out infinite;
    }
    @keyframes breathing-loading {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }
    @keyframes card-breathe {
      0%, 100% { transform: scale(1);     box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 0 0 rgba(180,150,220,0); }
      50%       { transform: scale(1.013); box-shadow: 0 12px 40px rgba(0,0,0,0.22), 0 0 28px rgba(180,150,220,0.18); }
    }
    .back-card img {
      width: 100%;
      display: block;
      border-radius: 20px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .back-hint {
      position: absolute;
      bottom: 1.4rem;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.56rem;
      letter-spacing: 0.36em;
      color: rgba(255,255,255,0.65);
      animation: none;
      pointer-events: none;
      transition: all 0.3s ease;
      line-height: 1.8;
    }
    @keyframes hint-pulse {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1; }
    }
    .back-card:hover .back-hint {
      opacity: 1;
      font-size: 0.62rem;
      letter-spacing: 0.4em;
    }

    /* 點擊光暈 */
    .halo-ring {
      position: absolute;
      top: 50%; left: 50%;
      width: 80px; height: 80px;
      margin: -40px 0 0 -40px;
      border-radius: 50%;
      border: 1.5px solid rgba(180,155,225,0.55);
      pointer-events: none;
      animation: halo-out 0.7s ease-out forwards;
      z-index: 3;
    }
    @keyframes halo-out {
      0%   { transform: scale(0.8); opacity: 0.9; }
      100% { transform: scale(4.5); opacity: 0; }
    }

    /* ════════════════════════════════════════
       第一張卡：直覺祝福
    ════════════════════════════════════════ */
    .ic-wrap {
      border-radius: 16px;
      padding: 2.8rem 2.4rem 2.6rem;
      background: rgba(196, 170, 223, 0.10);
      border: 1px solid rgba(196, 170, 223, 0.28);
      box-shadow:
        inset 3px 0 0 0 var(--lavender),
        0 12px 36px rgba(120, 90, 160, 0.10),
        0 3px 10px rgba(0, 0, 0, 0.05);
      display: none;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.62s ease, transform 0.62s ease;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .ic-wrap.appear { opacity: 1; transform: translateY(0); }

    /* 頂部裝飾細線 */
    .ic-strip {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      opacity: 0.45;
    }

    .ic-label {
      font-family: "Cormorant Garamond", serif;
      font-size: 0.64rem;
      letter-spacing: 0.35em;
      color: #5A4878;
      text-align: center;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      font-weight: 500;
    }
    .ic-text {
      font-size: 1.42rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      line-height: 2.2;
      text-align: center;
      color: #2A2040;
      white-space: pre-line;
      padding: 0 1rem;
    }

    .ic-hint {
      text-align: center;
      font-size: 0.70rem;
      color: #6A5888;
      letter-spacing: 0.08em;
      margin-top: 1.2rem;
      padding-bottom: 0.4rem;
    }

    /* ════════════════════════════════════════
       第二張卡：脈輪卡（3D 翻轉）
    ════════════════════════════════════════ */
    .ck-scene {
      display: none;
      position: relative;
    }
    .ck-scene.active { display: block; }

    /* 粒子層 */
    .particle-field {
      position: absolute;
      inset: -50px;
      pointer-events: none;
      overflow: visible;
      z-index: 5;
    }
    .card-particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: particle-drift linear forwards;
    }
    @keyframes particle-drift {
      0%   { opacity: 0.8; transform: translate(0, 0) scale(1); }
      20%  { opacity: 1; }
      100% { opacity: 0;  transform: translate(var(--dx), var(--dy)) scale(0.15); }
    }

    /* 3D 場景 */
    .ck-3d-scene { width: 100%; }
    .ck-3d {
      width: 100%;
      position: relative;
      min-height: 420px;
    }

    /* 通用面 */
    .ck-face {
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
    }

    /* 背面（結果卡片區） */
    .ck-back {
      min-height: 420px;
      background: linear-gradient(160deg,
        rgba(255, 252, 248, 0.95) 0%,
        rgba(240, 232, 255, 0.85) 100%);
      border: 1px solid rgba(196, 170, 223, 0.35);
      box-shadow:
        inset 3px 0 0 0 var(--lavender),
        0 16px 48px rgba(90, 70, 130, 0.18);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 2.4rem 2rem;
      border-radius: 24px;
      opacity: 1;
      transition: opacity 0.6s ease, transform 0.6s ease;
      z-index: 1;
    }
    .ck-back.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
    }

    .ck-back::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(147,112,219,0.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(200,180,255,0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* 初始提示狀態 */
    .ck-back-hint {
      position: relative;
      z-index: 1;
      text-align: center;
      font-size: 0.9rem;
      line-height: 1.8;
      color: var(--lavender);
      font-weight: 300;
      letter-spacing: 0.05em;
      transition: opacity 0.5s ease;
    }

    .ck-back-hint-icon {
      font-size: 2.4rem;
      margin-bottom: 1rem;
      opacity: 0.6;
      animation: none;
    }

    @keyframes hint-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* ════════════════════════════════════════
       重設計：5 層資訊結構
    ════════════════════════════════════════ */

    .ck-back-content {
      position: relative;
      z-index: 1;
      text-align: center;
      width: 100%;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.5s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 0 1rem;
    }

    .ck-back-content.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* 第一層：訊息類別 */
    .ck-layer-1 {
      font-family: "Cormorant Garamond", serif;
      font-size: 0.64rem;
      letter-spacing: 0.3em;
      color: var(--lavender);
      text-transform: uppercase;
      font-weight: 500;
    }

    /* 第二層：卡牌名稱（最大標題） */
    .ck-layer-2 {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .ck-back-card-icon {
      font-size: 2.6rem;
      opacity: 0.9;
    }

    .ck-back-card-title {
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #3A3255;
      line-height: 1.4;
      max-width: 220px;
    }

    /* 第三層：核心訊息（主內容） */
    .ck-layer-3 {
      font-size: 1.04rem;
      line-height: 2.1;
      letter-spacing: 0.02em;
      color: #4A4070;
      max-width: 300px;
      font-weight: 400;
    }

    /* 第四層：行動建議 */
    .ck-layer-4 {
      width: 100%;
      max-width: 220px;
    }

    .ck-back-card-action {
      font-size: 0.96rem;
      line-height: 1.95;
      letter-spacing: 0.01em;
      color: #5A4A7A;
      padding: 1rem 1.2rem;
      background: rgba(196, 170, 223, 0.14);
      border-left: 3px solid rgba(155, 120, 196, 0.55);
      border-radius: 8px;
      text-align: left;
    }

    /* 第五層：自我提問 */
    .ck-layer-5 {
      font-size: 0.88rem;
      line-height: 1.9;
      letter-spacing: 0.01em;
      color: #8A7AAA;
      font-style: italic;
      font-weight: 300;
      max-width: 220px;
    }

    /* 點擊繼續提示 */
    .ck-tap-continue {
      margin-top: 2rem;
      animation: tapPulse 2s ease-in-out infinite;
      cursor: pointer;
      text-align: center;
    }
    .ck-tap-continue span {
      display: inline-block;
      font-size: 0.88rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: #6A48A8;
      background: linear-gradient(135deg, rgba(201,180,232,0.28) 0%, rgba(245,233,168,0.22) 100%);
      border: 1.5px solid rgba(180,148,220,0.65);
      border-radius: 100px;
      padding: 0.85rem 2rem;
      box-shadow: 0 3px 16px rgba(180,148,220,0.22);
    }
    .ck-tap-continue.hidden { display: none; }
    @keyframes tapPulse {
      0%, 100% { opacity: 0.8; transform: translateY(0); }
      50%       { opacity: 1;   transform: translateY(-3px); box-shadow: 0 6px 24px rgba(180,148,220,0.35); }
    }

    /* 隱藏舊的不用樣式 */
    .ck-back-card-action-label {
      display: none;
    }

    /* 舊的動畫元素隱藏 */
    .ck-back-aura,
    .ck-back-symbol {
      display: none;
    }
    .ck-back-strip {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #e8b4c0, #d4b8cc, #b8acd4, #a8c4d8, #b8d4c0);
      opacity: 0.55;
    }

    /* 正面 */
    .ck-front {
      position: absolute;
      top: 0; left: 0; right: 0;
      width: 100%;
      min-height: 420px;
      background: linear-gradient(160deg,
        rgba(255, 252, 248, 0.95) 0%,
        rgba(240, 232, 255, 0.85) 100%);
      border: 1px solid rgba(196, 170, 223, 0.35);
      box-shadow:
        inset 3px 0 0 0 var(--lavender),
        0 16px 48px rgba(90, 70, 130, 0.18);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      overflow: hidden;
      border-radius: 24px;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
      z-index: 2;
    }
    .ck-front.visible {
      opacity: 1;
      pointer-events: all;

function pageTint(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  // 混入深紫底色 #3A3255，保留 92% 深色 + 8% 卡片色
  const base = [58, 50, 85];
  const t = 0.92;
  return `rgb(${Math.round(r+(base[0]-r)*t)},${Math.round(g+(base[1]-g)*t)},${Math.round(b+(base[2]-b)*t)})`;
}
function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function formatDate() {
  const d = new Date();
  const days = ['日','一','二','三','四','五','六'];
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} 星期${days[d.getDay()]}`;
}

// IG 圖片生成
function generateIGImage(ic, ck) {
  const SIZE = 1080;
  const cv   = document.createElement('canvas');
  cv.width = cv.height = SIZE;
  const c = cv.getContext('2d');
  // 背景
  c.fillStyle = pageTint(ck.color);
  c.fillRect(0, 0, SIZE, SIZE);
  const halo = c.createRadialGradient(SIZE/2, SIZE/2, 0, SIZE/2, SIZE/2, SIZE*0.55);
  halo.addColorStop(0, hexAlpha(ck.color, 0.16));
  halo.addColorStop(1, 'rgba(0,0,0,0)');
  c.fillStyle = halo; c.fillRect(0, 0, SIZE, SIZE);
  // 色條
  c.fillStyle = ck.color; c.globalAlpha = 0.7; c.fillRect(0, 0, SIZE, 8);
  c.globalAlpha = 1;
  // 裝飾圓環
  c.strokeStyle = hexAlpha(ck.color, 0.1); c.lineWidth = 1;
  [260, 320, 380].forEach(r => {
    c.beginPath(); c.arc(SIZE/2, SIZE/2, r, 0, Math.PI*2); c.stroke();
  });
  // 直覺文字（大）
  c.font = '300 52px "Noto Serif TC", serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillStyle = '#2e2a26';
  const icLines = ic.text.split('\n');
  icLines.forEach((line, i) => {
    c.fillText(line, SIZE/2, 330 + (i - (icLines.length-1)/2) * 72);
  });
  // 分隔
  const g = c.createLinearGradient(SIZE/2-80, 440, SIZE/2+80, 440);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(0.5, hexAlpha(ck.color, 0.35));
  g.addColorStop(1, 'rgba(0,0,0,0)');
  c.strokeStyle = g; c.lineWidth = 1;
  c.beginPath(); c.moveTo(SIZE/2-80, 440); c.lineTo(SIZE/2+80, 440); c.stroke();
  // 脈輪名
  c.font = '300 26px "Noto Serif TC", serif';
  c.fillStyle = hexAlpha(ck.color, 0.75);
  c.fillText(`${ck.name}  ·  ${ck.en}`, SIZE/2, 490);
  // 脈輪祝福
  c.font = '400 48px "Noto Serif TC", serif';
  c.fillStyle = '#2e2a26';
  c.shadowColor = hexAlpha(ck.color, 0.2); c.shadowBlur = 22;
  const ckLines = ck.blessing.split('\n');
  ckLines.forEach((line, i) => {
    c.fillText(line, SIZE/2, 610 + (i - (ckLines.length-1)/2) * 64);
  });
  c.shadowBlur = 0;
  // 底部
  c.font = '200 20px "Noto Serif TC", serif';
  c.fillStyle = hexAlpha(ck.color, 0.45);
  c.fillText('今  日  祝  福', SIZE/2, 980);
  c.fillStyle = 'rgba(46,42,38,0.22)';
  c.fillText(formatDate(), SIZE/2, 1018);
  return cv;
}

  if (useSpirit) {
    // 抽靈性指引卡
    let idx;
    do { idx = Math.floor(Math.random() * SPIRIT_GUIDES.length); }
    while (idx === lastIdx && SPIRIT_GUIDES.length > 1);
    lastIdx = idx;
    lastType = 'spirit';
    return { ic: SPIRIT_GUIDES[idx], ck: null, type: 'spirit' };
  } else {
    // 抽脈輪卡（原有邏輯）
    let idx;
    do { idx = Math.floor(Math.random() * icCards.length); }

    lastType = 'chakra';
    return { ic: icCards[idx], ck: CHAKRA_DATA[icCards[idx].chakra], type: 'chakra' };
  }
}

  // 卡片背景：平鋪脈輪淡彩
  icWrap.style.background = hexAlpha(color, 0.10);
  icWrap.style.boxShadow = `inset 3px 0 0 0 ${hexAlpha(color, 0.9)}, 0 12px 36px ${hexAlpha(color, 0.16)}, 0 3px 10px rgba(0,0,0,0.06)`;
  icWrap.style.borderColor = hexAlpha(color, 0.28);
}

// ── 填充脈輪卡 或 靈性指引卡 ──
function fillCK(ck, spirit = null) {
  // 填充背卡：5 層結構
  const fillBackCard = (type, title, icon, message, action, question) => {
    document.getElementById('ckCardType').textContent = type;
    document.getElementById('ckCardIcon').textContent = icon;
    document.getElementById('ckCardTitle').textContent = title;
    document.getElementById('ckCardDeeper').textContent = message;
    document.getElementById('ckCardAction').textContent = action;
    document.getElementById('ckCardQuestion').textContent = question;
  };

  // ck-back 卡片本身跟隨同一顏色
  const ckColor = spirit ? spirit.color : ck.color;
  const ckBack = document.querySelector('.ck-back');
  if (ckBack) {
    ckBack.style.background = `linear-gradient(160deg, rgba(255,252,248,0.95) 0%, ${hexAlpha(ckColor, 0.18)} 100%)`;
    ckBack.style.borderColor = hexAlpha(ckColor, 0.38);
    ckBack.style.boxShadow = `inset 3px 0 0 0 ${hexAlpha(ckColor, 0.9)}, 0 16px 48px ${hexAlpha(ckColor, 0.18)}`;
  }

  if (spirit) {
    // 靈性指引卡：5 層結構
    document.getElementById('ckStrip').style.background = spirit.color;
    document.getElementById('ckDot').style.background = spirit.color;
    document.getElementById('ckName').textContent = spirit.title;
    document.getElementById('ckEn').textContent = spirit.category;
    document.getElementById('ckElementLocation').textContent = spirit.category;
    document.getElementById('ckBlessing').textContent = spirit.text;
    document.getElementById('ckAction').textContent = spirit.action;

    // 背卡內容：新的 5 層結構
    fillBackCard(
      spirit.category,
      spirit.title,
      '',
      spirit.text,
      spirit.action,
      spirit.question || '這訊息對你的當下有什麼啟發？'
    );

    document.getElementById('ckDeeperSection').style.display = 'none';
  } else {
    // 脈輪卡：5 層結構
    document.getElementById('ckStrip').style.background = ck.color;
    document.getElementById('ckDot').style.background = ck.color;
    document.getElementById('ckName').textContent = ck.name;
    document.getElementById('ckEn').textContent = ck.en;
    const elementIcon = '';
    document.getElementById('ckElementLocation').textContent = `${elementIcon} ${ck.element}元素 · ${ck.location}`;
    document.getElementById('ckBlessing').textContent = ck.blessing;
    document.getElementById('ckAction').textContent = ck.action;
    document.getElementById('ckDeeper').textContent = ck.deeper;
    document.getElementById('ckTransform').textContent = ck.transform;

    // 背卡內容：新的 5 層結構
    fillBackCard(
      `今日訊息 · ${ck.name}`,
      ck.name,
      '',
      ck.deeper,
      ck.action,
      `你可以如何用 ${ck.name} 的能量轉化此刻？`
    );

    document.getElementById('ckDeeperSection').style.display = 'block';
  }
  document.querySelectorAll('#ckFront .ta').forEach(el => el.classList.remove('in'));
}

// ── 文字淡入（節奏感分層）──
function animateCKText() {
  const elements = document.querySelectorAll('#ckFront .ta');
  const delays = [0, 120, 240, 360, 520, 800, 1100, 1400];
  elements.forEach((el, i) => {
    setTimeout(() => el.classList.add('in'), 300 + (delays[i] ?? i * 150));
  });
  const roomBtn = document.getElementById('roomBtn');
  if (roomBtn) {
    roomBtn.style.opacity = '0';
    roomBtn.style.pointerEvents = 'none';
    setTimeout(() => {
      roomBtn.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
      roomBtn.style.opacity = '0.7';
      roomBtn.style.pointerEvents = 'all';
    }, 1600);
  }
}

// ── 粒子 ──
function spawnParticles(color) {
  const r = parseInt(color.slice(1,3),16);
  const g = parseInt(color.slice(3,5),16);
  const b = parseInt(color.slice(5,7),16);
  const palette = [
    `rgba(${r},${g},${b},0.5)`,
    'rgba(200,175,240,0.42)',
    'rgba(240,190,210,0.38)',
    'rgba(175,210,240,0.38)',
  ];
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'card-particle';
    const size  = 2 + Math.random() * 4;
    const angle = Math.random() * Math.PI * 2;
    const dist  = 55 + Math.random() * 100;
    const dur   = 2.2 + Math.random() * 2.4;
    p.style.width  = size + 'px';
    p.style.height = size + 'px';
    p.style.left = `calc(50% + ${(Math.random()-0.5)*50}px)`;
    p.style.top  = `calc(50% + ${(Math.random()-0.5)*70}px)`;
    p.style.background = palette[Math.floor(Math.random()*palette.length)];
    p.style.setProperty('--dx', (Math.cos(angle)*dist) + 'px');
    p.style.setProperty('--dy', (Math.sin(angle)*dist - 18) + 'px');
    p.style.animationDuration = dur + 's';
    particleField.appendChild(p);
    setTimeout(() => p.remove(), dur * 1000);
  }
}

// ── 光暈環 ──
function spawnHalo(target) {
  const h = document.createElement('div');
  h.className = 'halo-ring';
  target.appendChild(h);
  setTimeout(() => h.remove(), 750);
}

// ── 翻到正面 ──
function flipCKIn() {
  const ckBack = document.querySelector('.ck-back');
  const ckFront = document.querySelector('.ck-front');

  ckBack.classList.add('hidden');
  ckFront.classList.add('visible');

  setTimeout(() => {
    animateCKText();
  }, 300);
}

// ── 翻回背面 ──
function flipCKOut(cb) {
  const ckBack = document.querySelector('.ck-back');
  const ckFront = document.querySelector('.ck-front');

  ckFront.classList.remove('visible');
  ckBack.classList.remove('hidden');

  setTimeout(() => {
    if (cb) cb();
  }, 600);
}

// ── 顯示一組牌 ──
function showPair(pair) {
  currentIC = pair.ic;
  currentCK = pair.ck;
  const isSpirit = pair.type === 'spirit';
  const cardColor = isSpirit ? pair.ic.color : pair.ck.color;

  fillIC(pair.ic, isSpirit);
  if (isSpirit) {
    fillCK(null, pair.ic);
  } else {
    fillCK(pair.ck, null);
  }

  // 背景色漸層：在深紫底色上加入卡片色光暈
  const tintColor = pageTint(cardColor);
  document.body.style.backgroundColor = tintColor;
  document.body.style.backgroundImage = `
    radial-gradient(ellipse 90% 45% at 50% 0%, rgba(196,170,223,0.28) 0%, transparent 60%),
    radial-gradient(ellipse 65% 35% at 15% 40%, rgba(232,201,122,0.14) 0%, transparent 55%),
    radial-gradient(ellipse 60% 40% at 50% 50%, ${hexAlpha(cardColor, 0.14)} 0%, transparent 65%),
    radial-gradient(ellipse 80% 40% at 50% 100%, rgba(232,201,122,0.18) 0%, transparent 60%)
  `;

  if (isSpirit) {
    // 靈性指引卡：跳過第一張，直接顯示
    icWrap.style.display = 'none';
    ckScene.classList.add('active');
    showResultCard(true);
    setTimeout(() => {
      ckScene.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 200);
    return;
  }

  // 卡1：直覺祝福 淡入
  icWrap.style.display = 'block';
  void icWrap.offsetWidth;
  icWrap.classList.add('appear');

  // 卡1 出現後，自動平滑捲動到卡1 讓用戶閱讀
  setTimeout(() => {
    icWrap.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 200);

  // 卡2：延遲 2.8 秒再出現（讓用戶充分閱讀卡1）
  setTimeout(() => {
    ckScene.classList.add('active');
    showResultCard(true);

    // 捲動到卡2 讓用戶閱讀背面
    setTimeout(() => {
      ckScene.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 300);

    // 延遲 0.6 秒再綁定點擊，避免滾動瞬間誤觸
    setTimeout(() => {
      const tapContinue = document.getElementById('ckTapContinue');
      tapContinue.classList.remove('hidden');

      let flipped = false;
      const doFlip = (e) => {
        e.stopPropagation();
        if (flipped) return;
        flipped = true;
        tapContinue.classList.add('hidden');
        tapContinue.removeEventListener('click', doFlip);
        flipCKIn();
        setTimeout(() => {
          redrawBtn.classList.add('visible');
          state = 'shown';
        }, 1800);
      };

      tapContinue.addEventListener('click', doFlip);
    }, 600);
  }, 2800);
}

// ── 抽牌觸發 ──
function handleDraw(selectedCard) {
  if (state !== 'idle') return;
  state = 'animating';

  // 其他兩張牌淡出，選中牌上浮
  document.querySelectorAll('.tarot-card').forEach(card => {
    if (card === selectedCard) {
      card.classList.add('selected');
    } else {
      card.classList.add('fading-out');
    }
  });

  spawnHalo(selectedCard);

  // 短暫停頓後整個 backScene 淡出，顯示結果
  setTimeout(() => {
    backScene.classList.add('fading');
  }, 500);
  setTimeout(() => {
    backScene.style.display = 'none';
    showPair(pickPair());
  }, 750);
}

// ── 顯示結果卡片 ──
function showResultCard(delayHide = false) {
  const resultCard = RESULT_CARDS[Math.floor(Math.random() * RESULT_CARDS.length)];
  const hintEl = document.getElementById('ckBackHint');
  const contentEl = document.getElementById('ckBackContent');

  // 填充卡片內容
  document.getElementById('ckCardType').textContent = resultCard.type;
  document.getElementById('ckCardIcon').textContent = resultCard.icon;
  document.getElementById('ckCardTitle').textContent = resultCard.title;
  document.getElementById('ckCardDeeper').textContent = resultCard.deeper;
  document.getElementById('ckCardAction').textContent = resultCard.action;

  // 立即顯示內容（淡入）
  contentEl.classList.add('show');

  // 延遲隱藏提示（讓用戶先看到提示文字）
  if (delayHide) {
    setTimeout(() => {
      hintEl.style.opacity = '0';
      setTimeout(() => {
        hintEl.style.display = 'none';
        hintEl.style.opacity = '1';
      }, 500);
    }, 800);
  } else {
    // 立即隱藏提示
    hintEl.style.display = 'none';
  }
}

// ── 換一張 ──
function resetTarotSpread() {
  backScene.style.display = 'block';
  backScene.classList.remove('fading');
  document.querySelectorAll('.tarot-card').forEach(card => {
    card.classList.remove('selected', 'fading-out');
  });
}

function handleRedraw() {
  if (state !== 'shown') return;
  state = 'animating';

  redrawBtn.classList.remove('visible');

  // 卡1 淡出
  icWrap.classList.remove('appear');
  setTimeout(() => {
    icWrap.style.display = 'none';
  }, 650);

  // 卡2 翻回背面，然後顯示新的結果卡片
  flipCKOut(() => {
    // 清空舊的卡片
    const contentEl = document.getElementById('ckBackContent');
    contentEl.classList.remove('show');

    // 重置「點擊繼續」提示
    const tapContinue = document.getElementById('ckTapContinue');
    tapContinue.classList.add('hidden');

    // 短暫停頓後顯示新卡片，再重新給使用者點擊翻面
    setTimeout(() => {
      // 填入新內容（保留背面讓用戶閱讀）
      const pair = pickPair();
      currentIC = pair.ic;
      currentCK = pair.ck;
      const isSpirit = pair.type === 'spirit';
      fillIC(pair.ic, isSpirit);
      if (isSpirit) { fillCK(null, pair.ic); } else { fillCK(pair.ck, null); }
      showResultCard(false);
      if (isSpirit) {
        icWrap.style.display = 'none';
      } else {
        icWrap.style.display = 'block';
        void icWrap.offsetWidth;
        icWrap.classList.add('appear');
      }

      // 延遲再綁定點擊，避免誤觸
      setTimeout(() => {
        tapContinue.classList.remove('hidden');
        let flipped = false;
        const doFlip = (e) => {
          e.stopPropagation();
          if (flipped) return;
          flipped = true;
          tapContinue.classList.add('hidden');
          tapContinue.removeEventListener('click', doFlip);
          flipCKIn();
          setTimeout(() => {
            redrawBtn.classList.add('visible');
            state = 'shown';
          }, 1800);
        };
        tapContinue.addEventListener('click', doFlip);
      }, 400);
    }, 400);
  });
}

document.querySelectorAll('.tarot-card').forEach(card => {
  card.addEventListener('click', () => { if (state === 'idle') handleDraw(card); });
});
redrawBtn.addEventListener('click', handleRedraw);


// ── 進入房間 ──
document.getElementById('roomBtn').addEventListener('click', function() {
  let chakra;

  if (currentCK) {
    // 已有脈輪卡，直接使用
    chakra = currentCK;
  } else if (currentIC && currentIC.chakra !== undefined) {
    // 直覺卡有脈輪關聯，使用關聯的脈輪卡
    chakra = CHAKRA_DATA[currentIC.chakra];
  } else {
    // 靈性指引卡，隨機選擇一個脈輪卡
    chakra = CHAKRA_DATA[Math.floor(Math.random() * CHAKRA_DATA.length)];
  }

  localStorage.setItem('todayChakra', JSON.stringify({
    name: chakra.name,
    en: chakra.en,
    color: chakra.color,
    timestamp: Date.now()
  }));
  window.location.href = 'cat-room.html';
});

// ── LINE 分享 ──
document.getElementById('ckShare').addEventListener('click', async function() {
  if (!currentIC) return;

  let chakra;
  if (currentCK) {
    chakra = currentCK;
  } else if (currentIC.chakra !== undefined) {
    chakra = CHAKRA_DATA[currentIC.chakra];
  } else {
    // 靈性指引卡，使用相關的脈輪卡
    chakra = CHAKRA_DATA[Math.floor(Math.random() * CHAKRA_DATA.length)];
  }

  const orig = this.textContent;
  this.textContent = '傳送中…';
  this.disabled = true;
  try {
    await shareToLine(buildBlessingFlexMessage(currentIC.text, chakra));
  } catch(e) {}
  this.textContent = orig;
  this.disabled = false;
});

// ── Instagram 分享 ──
document.getElementById('igBtn').addEventListener('click', async function() {
  if (!currentIC) return;

  let chakra;
  if (currentCK) {
    chakra = currentCK;
  } else if (currentIC.chakra !== undefined) {
    chakra = CHAKRA_DATA[currentIC.chakra];
  } else {
    chakra = CHAKRA_DATA[Math.floor(Math.random() * CHAKRA_DATA.length)];
  }

  const bgColor = chakra.color || '#C4AADF';
  const orig = this.textContent;
  this.textContent = '準備中…';
  this.disabled = true;
  try {
    await shareToInstagram(chakra.name, currentIC.text, bgColor, chakra.action || '');
  } catch(e) {}
  this.textContent = orig;
  this.disabled = false;
});

  await initLiff();

    const greet = document.getElementById('lineGreeting');

  }
})();
