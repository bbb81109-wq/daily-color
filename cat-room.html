<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>聽見身體 | Anmita Riga</title>
  <meta name="description" content="今天，身體的哪裡有感覺？選一個部位，選一個顏色，聽聽身體想說的話。">
  <meta property="og:title" content="聽見身體 | Anmita Riga">
  <meta property="og:description" content="今天，身體的哪裡有感覺？">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://euphonious-lebkuchen-60376f.netlify.app/icon-512.png">
  <meta name="theme-color" content="#8EC4D8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
  <script>
    // 只在 LINE App 內才載入 LIFF SDK，避免外部瀏覽器等待 LINE 伺服器
    if (/Line\//i.test(navigator.userAgent)) {
      var s = document.createElement('script');
      s.src = 'https://static.line-scdn.net/liff/edge/2/sdk.js';
      s.onload = function() {
        var l = document.createElement('script'); l.src = 'liff.js'; document.head.appendChild(l);
      };
      document.head.appendChild(s);
    }
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body { animation: pageIn 0.5s ease both;
      min-height: 100dvh;
      background: linear-gradient(180deg, #EFF6FA 0%, #F4EFF8 50%, #EFF6FA 100%);
      font-family: "Noto Serif TC", Georgia, serif;
      font-weight: 300;
      color: #5A5A6A;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 500px 350px at 20% 20%, rgba(190,210,240,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 400px 300px at 80% 70%, rgba(210,190,240,0.1) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }

    /* ── Header ── */
    header {
      width: 100%; max-width: 480px;
      padding: 20px 24px 0;
      display: flex; align-items: center; justify-content: space-between;
      position: relative; z-index: 1;
    }

    .back-btn {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 14px;
      letter-spacing: 0.14em; color: #9A8AAA;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 5px;
      opacity: 0.75; transition: opacity 0.25s;
    }
    .back-btn:hover { opacity: 1; }

    .page-tag {
      font-size: 10px; letter-spacing: 0.32em;
      color: #B0A0B8; font-weight: 300; text-transform: uppercase;
    }

    /* ── Steps ── */
    .step {
      display: none; flex-direction: column; align-items: center;
      width: 100%; max-width: 480px;
      padding: 1.5rem 1.5rem 5rem;
      position: relative; z-index: 1;
    }
    .step.active { display: flex; }

    .step-eyebrow {
      font-size: 9px; letter-spacing: 0.38em;
      color: #B0A0B8; text-transform: uppercase; margin-bottom: 0.5rem;
    }

    .step-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.4rem, 6vw, 1.8rem);
      font-weight: 300; letter-spacing: 0.08em;
      color: #5A5A6A; text-align: center;
      margin-bottom: 0.4rem;
    }

    .step-hint {
      font-size: 0.75rem; line-height: 1.8;
      color: #9A8AAA; text-align: center;
      letter-spacing: 0.04em; margin-bottom: 1.8rem;
    }

    /* ── SVG Figure ── */
    .figure-wrap {
      position: relative;
      width: 100%; max-width: 280px;
      margin: 0 auto 1.2rem;
    }

    .body-figure {
      width: 100%; height: auto;
      filter: drop-shadow(0 4px 20px rgba(120,140,200,0.08));
    }

    .body-zone {
      cursor: pointer;
      transition: all 0.2s ease;
    }

    /* 各部位顏色 */
    :root {
      --c-head:   210, 195, 240; /* 淡紫 — 頭腦、眼睛 */
      --c-throat: 170, 215, 225; /* 水藍 — 喉嚨 */
      --c-chest:  240, 185, 195; /* 玫瑰粉 — 胸口、肩膀 */
      --c-arm:    240, 210, 175; /* 暖杏 — 上臂、前臂 */
      --c-belly:  200, 225, 185; /* 薄荷綠 — 腹部 */
      --c-low:    175, 215, 200; /* 鼠尾草 — 下腹 */
      --c-leg:    185, 210, 240; /* 天藍 — 大腿、小腿 */
      --c-foot:   195, 185, 235; /* 薰衣草 — 腳踝、腳掌 */
      --c-joint:  220, 205, 175; /* 金米 — 髖、膝、肘、腕 */
    }

    .zone-shape {
      stroke-width: 1.5;
      transition: all 0.22s ease;
    }

    /* 預設各區域顏色 */
    [data-part="head"] .zone-shape,
    [data-part="eyes"] .zone-shape      { fill: rgba(var(--c-head), 0.28);   stroke: rgba(var(--c-head), 0.55); }
    [data-part="throat"] .zone-shape    { fill: rgba(var(--c-throat), 0.3);  stroke: rgba(var(--c-throat), 0.6); }
    [data-part="chest"] .zone-shape,
    [data-part="shoulders"] .zone-shape { fill: rgba(var(--c-chest), 0.3);   stroke: rgba(var(--c-chest), 0.6); }
    [data-part="upper_arms"] .zone-shape,
    [data-part="forearms"] .zone-shape  { fill: rgba(var(--c-arm), 0.3);     stroke: rgba(var(--c-arm), 0.6); }
    [data-part="belly"] .zone-shape     { fill: rgba(var(--c-belly), 0.3);   stroke: rgba(var(--c-belly), 0.6); }
    [data-part="lower_belly"] .zone-shape { fill: rgba(var(--c-low), 0.3);   stroke: rgba(var(--c-low), 0.6); }
    [data-part="thighs"] .zone-shape,
    [data-part="shins"] .zone-shape     { fill: rgba(var(--c-leg), 0.28);    stroke: rgba(var(--c-leg), 0.55); }
    [data-part="feet"] .zone-shape,
    [data-part="ankles"] .zone-shape    { fill: rgba(var(--c-foot), 0.28);   stroke: rgba(var(--c-foot), 0.55); }
    [data-part="hips"] .zone-shape,
    [data-part="knees"] .zone-shape,
    [data-part="elbows"] .zone-shape,
    [data-part="wrists"] .zone-shape    { fill: rgba(var(--c-joint), 0.28);  stroke: rgba(var(--c-joint), 0.55); stroke-dasharray: 3 2; }

    /* Hover — 加深 */
    [data-part="head"]:hover .zone-shape,
    [data-part="eyes"]:hover .zone-shape      { fill: rgba(var(--c-head), 0.48);   stroke: rgba(var(--c-head), 0.8); }
    [data-part="throat"]:hover .zone-shape    { fill: rgba(var(--c-throat), 0.5);  stroke: rgba(var(--c-throat), 0.85); }
    [data-part="chest"]:hover .zone-shape,
    [data-part="shoulders"]:hover .zone-shape { fill: rgba(var(--c-chest), 0.5);   stroke: rgba(var(--c-chest), 0.85); }
    [data-part="upper_arms"]:hover .zone-shape,
    [data-part="forearms"]:hover .zone-shape  { fill: rgba(var(--c-arm), 0.5);     stroke: rgba(var(--c-arm), 0.85); }
    [data-part="belly"]:hover .zone-shape     { fill: rgba(var(--c-belly), 0.5);   stroke: rgba(var(--c-belly), 0.85); }
    [data-part="lower_belly"]:hover .zone-shape { fill: rgba(var(--c-low), 0.5);   stroke: rgba(var(--c-low), 0.85); }
    [data-part="thighs"]:hover .zone-shape,
    [data-part="shins"]:hover .zone-shape     { fill: rgba(var(--c-leg), 0.48);    stroke: rgba(var(--c-leg), 0.8); }
    [data-part="feet"]:hover .zone-shape,
    [data-part="ankles"]:hover .zone-shape    { fill: rgba(var(--c-foot), 0.48);   stroke: rgba(var(--c-foot), 0.8); }
    [data-part="hips"]:hover .zone-shape,
    [data-part="knees"]:hover .zone-shape,
    [data-part="elbows"]:hover .zone-shape,
    [data-part="wrists"]:hover .zone-shape    { fill: rgba(var(--c-joint), 0.48);  stroke: rgba(var(--c-joint), 0.85); stroke-dasharray: none; }

    /* Selected — 飽和加框 */
    .body-zone.selected .zone-shape {
      stroke-width: 2.2;
      stroke-dasharray: none !important;
      filter: brightness(1.05);
    }
    [data-part="head"].selected .zone-shape,
    [data-part="eyes"].selected .zone-shape      { fill: rgba(var(--c-head), 0.6);   stroke: rgba(var(--c-head), 1); }
    [data-part="throat"].selected .zone-shape    { fill: rgba(var(--c-throat), 0.62); stroke: rgba(var(--c-throat), 1); }
    [data-part="chest"].selected .zone-shape,
    [data-part="shoulders"].selected .zone-shape { fill: rgba(var(--c-chest), 0.62); stroke: rgba(var(--c-chest), 1); }
    [data-part="upper_arms"].selected .zone-shape,
    [data-part="forearms"].selected .zone-shape  { fill: rgba(var(--c-arm), 0.62);   stroke: rgba(var(--c-arm), 1); }
    [data-part="belly"].selected .zone-shape     { fill: rgba(var(--c-belly), 0.62); stroke: rgba(var(--c-belly), 1); }
    [data-part="lower_belly"].selected .zone-shape { fill: rgba(var(--c-low), 0.62); stroke: rgba(var(--c-low), 1); }
    [data-part="thighs"].selected .zone-shape,
    [data-part="shins"].selected .zone-shape     { fill: rgba(var(--c-leg), 0.6);    stroke: rgba(var(--c-leg), 1); }
    [data-part="feet"].selected .zone-shape,
    [data-part="ankles"].selected .zone-shape    { fill: rgba(var(--c-foot), 0.6);   stroke: rgba(var(--c-foot), 1); }
    [data-part="hips"].selected .zone-shape,
    [data-part="knees"].selected .zone-shape,
    [data-part="elbows"].selected .zone-shape,
    [data-part="wrists"].selected .zone-shape    { fill: rgba(var(--c-joint), 0.6);  stroke: rgba(var(--c-joint), 1); }

    .zone-label {
      font-family: "Noto Serif TC", serif;
      font-size: 10px;
      fill: rgba(70, 70, 90, 0.6);
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      transition: fill 0.2s;
    }
    .body-zone.selected .zone-label { fill: rgba(50, 60, 80, 0.92); }

    /* cute face */
    .face-feature { pointer-events: none; }

    /* ── Selected tags ── */
    .selected-tags {
      display: flex; flex-wrap: wrap; gap: 6px;
      justify-content: center; min-height: 28px;
      margin-bottom: 1.4rem;
    }

    .tag {
      font-size: 11px; letter-spacing: 0.08em;
      padding: 4px 12px;
      border: 1px solid rgba(142, 196, 216, 0.6);
      border-radius: 20px;
      color: #5A8AA0;
      background: rgba(142, 196, 216, 0.12);
      animation: tagIn 0.2s ease;
    }

    @keyframes tagIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Buttons ── */
    .btn-primary {
      padding: 14px 44px;
      border: 1px solid rgba(142, 196, 216, 0.5);
      border-radius: 2px;
      background: rgba(142, 196, 216, 0.1);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem; letter-spacing: 0.18em;
      color: #5A8AA0;
      cursor: pointer;
      transition: all 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-primary:disabled {
      opacity: 0.35; cursor: not-allowed;
    }

    .btn-primary:not(:disabled):hover {
      background: rgba(142, 196, 216, 0.2);
      border-color: rgba(142, 196, 216, 0.75);
      transform: translateY(-2px);
    }

    .btn-secondary {
      font-size: 11px; letter-spacing: 0.2em;
      color: #A090A8; text-decoration: none;
      background: none; border: none; cursor: pointer;
      padding: 8px; margin-top: 0.8rem;
      opacity: 0.7; transition: opacity 0.2s;
    }
    .btn-secondary:hover { opacity: 1; }

    /* ── Color Picker ── */
    .color-section { width: 100%; margin-bottom: 1.6rem; }

    .color-group-label {
      font-size: 9px; letter-spacing: 0.28em;
      color: #B0A0B8; text-transform: uppercase;
      margin-bottom: 0.6rem; display: block;
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-bottom: 1.2rem;
    }

    .color-swatch {
      aspect-ratio: 1;
      border-radius: 50%;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .color-swatch::after {
      content: '';
      position: absolute; inset: -3px;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }

    .color-swatch:hover { transform: scale(1.12); }

    .color-swatch.selected {
      transform: scale(1.15);
      box-shadow: 0 0 0 2px white, 0 0 0 4px currentColor;
    }

    .color-swatch.selected::after {
      border-color: rgba(90,100,130,0.4);
    }

    /* ── Result ── */
    .result-card {
      width: 100%;
      border: 1px solid rgba(160, 180, 210, 0.25);
      border-radius: 4px;
      background: rgba(255,255,255,0.5);
      padding: 1.8rem 1.6rem;
      margin-bottom: 1.4rem;
    }

    .result-parts {
      display: flex; flex-wrap: wrap; gap: 5px;
      margin-bottom: 1rem;
    }

    .result-part-tag {
      font-size: 10px; letter-spacing: 0.1em;
      padding: 3px 10px;
      border-radius: 12px;
      color: rgba(80, 120, 150, 0.9);
      border: 1px solid rgba(142, 196, 216, 0.5);
      background: rgba(142, 196, 216, 0.1);
    }

    .result-color-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
      vertical-align: middle;
    }

    .result-divider {
      width: 32px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(160,180,210,0.5), transparent);
      margin: 1rem 0;
    }

    .result-message {
      font-size: 0.82rem; line-height: 2;
      color: #6A6A7A; letter-spacing: 0.04em;
      margin-bottom: 1rem;
    }

    .result-action-label {
      font-size: 9px; letter-spacing: 0.32em;
      color: #B0A0B8; text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .result-action {
      font-size: 0.78rem; line-height: 1.85;
      color: #5A8AA0; letter-spacing: 0.04em;
      font-style: italic;
    }

    /* color depth */
    .depth-card {
      width: 100%;
      margin-bottom: 1.4rem;
    }

    .depth-toggle {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      cursor: pointer; width: 100%;
      background: rgba(180,155,220,0.1);
      border: 1px solid rgba(180,155,220,0.35);
      border-radius: 24px;
      padding: 0.65rem 1.2rem;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.25s ease;
    }
    .depth-toggle:hover {
      background: rgba(180,155,220,0.2);
      border-color: rgba(180,155,220,0.6);
    }

    .depth-toggle-label {
      font-size: 0.78rem; letter-spacing: 0.08em;
      color: #7A5898; font-family: "Noto Serif TC", serif; font-weight: 400;
    }

    .depth-arrow {
      font-size: 0.65rem; color: #9A78B8; opacity: 0.7;
      transition: transform 0.3s;
    }
    .depth-arrow.open { transform: rotate(180deg); }

    .depth-content {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .depth-content.open { max-height: 400px; }

    .depth-text {
      font-size: 0.78rem; line-height: 2;
      color: #7A7A8A; padding-top: 1rem;
      letter-spacing: 0.03em;
    }

    /* ── Share Footer ── */
    .share-footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 14px 24px calc(14px + env(safe-area-inset-bottom));
      background: rgba(240,242,248,0.92);
      backdrop-filter: blur(12px);
      display: flex; gap: 10px;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.22,0.61,0.36,1);
      z-index: 50;
    }
    .share-footer.visible { transform: translateY(0); }

    .share-btn {
      flex: 1; padding: 12px 8px;
      border-radius: 3px; border: 1px solid rgba(160,180,210,0.35);
      background: rgba(255,255,255,0.6);
      font-family: "Noto Serif TC", serif;
      font-size: 12px; letter-spacing: 0.1em;
      color: #6A7A8A; cursor: pointer;
      transition: all 0.25s; text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .share-btn:hover { background: rgba(255,255,255,0.9); }
    .share-btn.line { color: #06C755; border-color: rgba(6,199,85,0.3); }

    .footer-nav {
      margin-top: 2.5rem;
      display: flex; gap: 1.6rem; justify-content: center;
    }

    .nav-planet-btn {
      display: flex; flex-direction: column; align-items: center;
      gap: 5px; text-decoration: none;
      opacity: 0.65; transition: opacity 0.25s, transform 0.25s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-planet-btn:hover { opacity: 1; transform: translateY(-2px); }

    .nav-orb-sm {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    .nav-orb-sm.gold {
      background: radial-gradient(circle at 42% 38%, rgba(255,252,220,0.9), rgba(245,215,100,0.7) 55%, rgba(220,180,60,0.5));
      box-shadow: 0 0 16px rgba(240,210,70,0.45);
    }
    .nav-orb-sm.purple {
      background: radial-gradient(circle at 42% 38%, rgba(240,232,255,0.9), rgba(196,170,223,0.7) 55%, rgba(160,128,200,0.5));
      box-shadow: 0 0 16px rgba(196,170,223,0.45);
    }

    .nav-name-sm {
      font-size: 9px; letter-spacing: 0.1em;
      color: #9A8AAA; text-align: center;
    }

    .footer-sig {
      margin-top: 2rem;
      font-size: 9px; letter-spacing: 0.22em;
      color: #C0B0C0; text-align: center;
    }

    @media (max-width: 480px) {
      .step { padding: 1.2rem 1.2rem 4rem; }
      .figure-wrap { max-width: min(85vw, 240px); }
      .step-title { font-size: clamp(1.2rem, 5.5vw, 1.5rem); }
      .step-hint { font-size: 0.7rem; margin-bottom: 1.2rem; }
      .color-grid { grid-template-columns: repeat(5, 1fr); gap: 6px; }
      .btn-primary { padding: 12px 32px; font-size: 1rem; }
      .result-card { padding: 1.4rem 1.2rem; }
      .result-message { font-size: 0.78rem; }
      .tag { font-size: 10px; padding: 3px 10px; }
    }
    @media (max-width: 360px) {
      .color-grid { grid-template-columns: repeat(5, 1fr); }
      .figure-wrap { max-width: 80vw; }
    }
    @keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<header>
  <a href="/" class="back-btn">
    <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
      <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    首頁
  </a>
  <span class="page-tag">Body Map</span>
</header>

<!-- ═══ Step 1: Body Figure ═══ -->
<div class="step active" id="step-body">
  <p class="step-eyebrow">今天的感受</p>
  <h1 class="step-title">身體的哪裡有感覺？</h1>
  <p class="step-hint">輕輕點選，可以選多個地方</p>

  <div class="figure-wrap">
    <svg viewBox="0 0 200 400" class="body-figure" xmlns="http://www.w3.org/2000/svg">

      <!-- 雙腳（最底層先畫） -->
      <g class="body-zone" data-part="feet" data-label="雙腳" onclick="togglePart(this)">
        <ellipse cx="80" cy="388" rx="20" ry="11" class="zone-shape"/>
        <ellipse cx="120" cy="388" rx="20" ry="11" class="zone-shape"/>
        <text x="100" y="392" class="zone-label" style="font-size:9px">腳掌</text>
      </g>

      <!-- 小腿 -->
      <g class="body-zone" data-part="shins" data-label="小腿" onclick="togglePart(this)">
        <rect x="69" y="320" width="22" height="52" rx="11" class="zone-shape"/>
        <rect x="109" y="320" width="22" height="52" rx="11" class="zone-shape"/>
        <text x="80" y="348" class="zone-label" style="font-size:9px">腿</text>
        <text x="120" y="348" class="zone-label" style="font-size:9px">腿</text>
      </g>

      <!-- 大腿 -->
      <g class="body-zone" data-part="thighs" data-label="大腿" onclick="togglePart(this)">
        <rect x="67" y="248" width="26" height="56" rx="13" class="zone-shape"/>
        <rect x="107" y="248" width="26" height="56" rx="13" class="zone-shape"/>
        <text x="80" y="278" class="zone-label" style="font-size:9px">腿</text>
        <text x="120" y="278" class="zone-label" style="font-size:9px">腿</text>

  ivory:      { text: '象牙白溫潤典雅，是時間給的顏色。你選了它，也許你正在學習看見自己的珍貴——不是因為完美，不是因為達到什麼，而是因為你本來就是珍貴的。' },

// ════════════════════════════════════════
//  狀態
// ════════════════════════════════════════

let selectedParts = new Set();
let selectedColor = null;

// ════════════════════════════════════════
//  建立顏色格
// ════════════════════════════════════════

function buildColorGrids() {
  const groups = { pink: [], blue: [], warm: [] };
  Object.entries(COLORS).forEach(([key, c]) => {
    if (groups[c.group]) groups[c.group].push([key, c]);
  });
  [['pink','grid-pink'],['blue','grid-blue'],['warm','grid-warm']].forEach(([g, id]) => {
    const grid = document.getElementById(id);
    groups[g].forEach(([key, c]) => {
      const el = document.createElement('div');
      el.className = 'color-swatch';
      el.dataset.color = key;
      el.title = c.name;
      el.style.background = c.hex;
      el.addEventListener('click', () => selectColor(key, el));
      grid.appendChild(el);
    });
  });
}

// ════════════════════════════════════════
//  互動邏輯
// ════════════════════════════════════════

function togglePart(group) {
  const part = group.dataset.part;
  if (selectedParts.has(part)) {
    selectedParts.delete(part);
    group.classList.remove('selected');
  } else {
    selectedParts.add(part);
    group.classList.add('selected');
  }
  updateTags();
  document.getElementById('next-to-color').disabled = selectedParts.size === 0;
}

function updateTags() {
  const container = document.getElementById('selected-tags');
  if (selectedParts.size === 0) {
    container.innerHTML = '<span style="font-size:11px;color:#C0B0C0;letter-spacing:0.08em">點選身體部位</span>';
    return;
  }
  container.innerHTML = [...selectedParts].map(p =>
    `<span class="tag">${BODY_PARTS[p]?.name || p}</span>`
  ).join('');
}

function selectColor(key, el) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  selectedColor = key;
  document.getElementById('next-to-result').disabled = false;

  // 更新主題色
  const hex = COLORS[key].hex;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  document.documentElement.style.setProperty('--accent', `rgba(${r},${g},${b},0.55)`);
}

function goToStep(id) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showResult() {
  const parts = [...selectedParts].map(k => BODY_PARTS[k]).filter(Boolean);
  const col = COLORS[selectedColor];
  const colorKeys = Object.keys(COLORS);
  const idx = colorKeys.indexOf(selectedColor) % 3;

  const primary = parts[0];
  const partNames = parts.map(p => p.name).join('、');
  const phrase = primary.phrases[idx];

  // headline
  document.getElementById('result-headline').textContent =
    parts.length === 1 ? `${primary.name}的聲音` : `${partNames}的感受`;

  // parts tags
  const partsEl = document.getElementById('result-parts');
  partsEl.innerHTML = parts.map(p =>
    `<span class="result-part-tag">${p.name}</span>`
  ).join('') + `<span class="result-part-tag"><span class="result-color-dot" style="background:${col.hex}"></span>${col.name}</span>`;

  // message
  let msg;
  if (parts.length === 1) {
    msg = `${col.name}的${col.energy.split('、')[0]}，映照著你${primary.name}的感受。${phrase}。`;
  } else {
    const secondName = parts[1]?.name || '';
    msg = `你的${partNames}同時有感覺。${phrase}——${col.name}的${col.energy.split('、')[0]}在說：此刻的你不只一個面向，每一處都值得被看見。`;
  }
  document.getElementById('result-message').textContent = msg;

  // action
  document.getElementById('result-action').textContent = primary.action;

  // color depth
  const depth = COLOR_DEPTH[selectedColor];
  if (depth) {
    document.getElementById('depth-card').style.display = 'block';
    document.getElementById('depth-text').textContent = depth.text;
  }

  // 更新脈輪覺察連結，帶入對應脈輪
  const chakraCatLink = document.getElementById('chakra-cat-link');
  if (chakraCatLink && primary.chakra) {
    chakraCatLink.href = `/chakra-cat?chakra=${encodeURIComponent(primary.chakra)}`;
  }
}

function toggleDepth() {
  const content = document.getElementById('depth-content');
  const arrow = document.getElementById('depth-arrow');
  const open = content.classList.toggle('open');
  arrow.classList.toggle('open', open);
}

function resetAll() {
  selectedParts.clear();
  selectedColor = null;
  document.querySelectorAll('.body-zone').forEach(z => z.classList.remove('selected'));
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  document.getElementById('next-to-color').disabled = true;
  document.getElementById('next-to-result').disabled = true;
  document.getElementById('depth-card').style.display = 'none';
  document.getElementById('depth-content').classList.remove('open');
  document.getElementById('depth-arrow').classList.remove('open');
  updateTags();
}

// ════════════════════════════════════════
//  事件綁定
// ════════════════════════════════════════

document.getElementById('next-to-color').addEventListener('click', () => goToStep('step-color'));
document.getElementById('back-to-body').addEventListener('click', () => {
  selectedColor = null;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  document.getElementById('next-to-result').disabled = true;
  goToStep('step-body');
});
document.getElementById('next-to-result').addEventListener('click', () => {
  showResult();
  goToStep('step-result');
  document.getElementById('share-footer').classList.add('visible');
});
document.getElementById('redraw-btn').addEventListener('click', () => {
  resetAll();
  goToStep('step-body');
  document.getElementById('share-footer').classList.remove('visible');
});

document.getElementById('line-share').addEventListener('click', async () => {
  if (!selectedColor || selectedParts.size === 0) return;
  const parts = [...selectedParts].map(k => BODY_PARTS[k]).filter(Boolean);
  const col = COLORS[selectedColor];
  const colorKeys = Object.keys(COLORS);
  const idx = colorKeys.indexOf(selectedColor) % 3;
  const primary = parts[0];
  const partNames = parts.map(p => p.name).join('、');
  const phrase = primary.phrases[idx];

  const text = `【聽見身體】\n\n今天有感覺的地方：${partNames}\n顏色心情：${col.name}\n\n${phrase}\n\n${primary.action}`;

  try {
    if (typeof buildRoomFlexMessage !== 'undefined') {
      const msgs = buildRoomFlexMessage(partNames, col.name, col.name, col.hex, text);
      await shareToLine(msgs);
    }
  } catch (e) {
    console.error('Share failed:', e);
  }
});

// ════════════════════════════════════════
//  初始化
// ════════════════════════════════════════

buildColorGrids();

</script>
