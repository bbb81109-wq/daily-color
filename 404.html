<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>找不到頁面 | Anmita Riga</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #F5F3F8 0%, #F2EAE4 50%, #F5F3F8 100%);
      font-family: "Noto Serif TC", Georgia, serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      color: #5A5059;
    }

    .symbol {
      font-size: 3.5rem;
      color: #D8C6F0;
      margin-bottom: 2rem;
      letter-spacing: 0.5em;
      opacity: 0.8;
    }

    h1 {
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      color: #9A8A9A;
      margin-bottom: 1.2rem;
    }

    p {
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      color: #A8999A;
      line-height: 2;
      text-align: center;
      margin-bottom: 3rem;
    }

    a {
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      color: #6b5b95;
      text-decoration: none;
      padding: 0.8rem 2rem;
      border: 1px solid rgba(147,112,219,0.3);
      border-radius: 50px;
      transition: all 0.3s ease;
    }

    a:hover {
      background: rgba(147,112,219,0.08);
      color: #5a4a7a;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="symbol">◈</div>
  <h1>頁面不存在</h1>
  <p>這個頁面不見了<br>或許宇宙想讓你去別的地方</p>
  <a href="index.html">回到宇宙訊號</a>
</body>
</html>
