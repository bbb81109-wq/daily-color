  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="liff.js"></script>
  <style>
    /* ── Design Tokens ── */
    :root {
      --ink-deepest: #FBF6EE;
      --ink-deep:    #F5EDE0;
      --gold:        #B8841E;
      --gold-soft:   #CFA040;
      --gold-line:   rgba(160, 110, 20, 0.40);
      --lavender:        #7A5AAA;
      --lavender-soft:   #9870C0;
      --lavender-deep:   #5A3A88;
      --quartz:        #3A7A9E;
      --quartz-soft:   #4A8CB0;
      --text-primary:   #2C2018;
      --text-secondary: #4A3828;
      --text-muted:     #8A7060;
      --ease-silk: cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { background: #F4F3F6 !important; }

    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse 120% 80% at 50% 30%, rgba(212, 192, 240, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse 100% 70% at 20% 60%, rgba(196, 170, 223, 0.04) 0%, transparent 55%),
        radial-gradient(ellipse 90% 60% at 80% 70%, rgba(142, 196, 216, 0.04) 0%, transparent 55%),
        radial-gradient(ellipse 110% 75% at 50% 80%, rgba(196, 170, 223, 0.03) 0%, transparent 60%),
        #F4F3F6 !important;
      transition: none;
      font-family: "Noto Serif TC", Georgia, serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem 6rem;
      color: var(--text-secondary);
      position: relative;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* 柔焦光場 — 宇宙呼吸 */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 25%, rgba(180, 150, 220, 0.06) 0%, transparent 65%),
        radial-gradient(ellipse 70% 50% at 15% 70%, rgba(196, 170, 223, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse 75% 55% at 85% 65%, rgba(142, 196, 216, 0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: aura-float 24s ease-in-out infinite;
    }

    @keyframes aura-float {
      0%, 100% {
        transform: translateY(0px);
        opacity: 0.8;
      }
      25% {
        transform: translateY(8px);
        opacity: 0.9;
      }
      50% {
        transform: translateY(0px);
        opacity: 0.8;
      }
      75% {
        transform: translateY(-8px);
        opacity: 0.85;
      }
    }
    body::after { display: none; }

    /* ── 返回行星按鈕 ── */
    .back-link {
      position: fixed;
      top: 1rem; left: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      z-index: 10;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      -webkit-tap-highlight-color: transparent;
    }
    .back-link::before {
      content: '';
      display: block;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #EDE0FF, #D4C0EC 55%, #C0A8E0);
      box-shadow: 0 3px 12px rgba(196, 170, 223, 0.5), 0 0 0 1px rgba(196, 170, 223, 0.3);
      flex-shrink: 0;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      animation: backPlanetFloat 4s ease-in-out infinite;
    }
    .back-link span {
      font-family: "Cormorant Garamond", serif;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      color: #7A6890;
      font-weight: 400;
      opacity: 0.85;
    }
    .back-link:hover::before {
      transform: scale(1.15);
      box-shadow: 0 5px 18px rgba(196, 170, 223, 0.7), 0 0 0 3px rgba(196, 170, 223, 0.2);
    }
    .back-link:hover span { opacity: 1; color: #5A4870; }

    @keyframes backPlanetFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
    }

    /* ── 底部回首頁行星按鈕 ── */
    .footer-home-link {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      margin-top: 3rem;
      margin-bottom: 2rem;
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      -webkit-tap-highlight-color: transparent;
    }
    .footer-home-link::before {
      content: '';
      display: block;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #EDE0FF, #D4C0EC 55%, #C0A8E0);
      box-shadow: 0 4px 16px rgba(196, 170, 223, 0.45), 0 0 0 1px rgba(196, 170, 223, 0.25);
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      animation: footerPlanetFloat 5s ease-in-out infinite;
    }
    .footer-home-link span {
      font-family: "Cormorant Garamond", serif;
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      color: #8A7898;
      font-weight: 400;
    }
    .footer-home-link:hover::before {
      transform: scale(1.12);
      box-shadow: 0 8px 24px rgba(196, 170, 223, 0.65), 0 0 0 3px rgba(196, 170, 223, 0.2);
    }
    .footer-home-link:hover span { color: #5A4870; }

    @keyframes footerPlanetFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }

    /* ── 標題 ── */
    .header {
      text-align: center;
      margin-bottom: 1.8rem;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 479px) {
      .header {
        margin-bottom: 1.2rem;
      }
    }
    .header h1 {
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.45em;
      color: var(--text-secondary);
    }
    .header p {
      margin-top: 0.8rem;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      line-height: 1.9;
      font-weight: 300;
    }

    /* ── 黑貓 ── */
    .cat-wrap {
      width: 100%;
      max-width: min(90vw, 600px);
      flex-shrink: 0;
      position: relative;
      overflow: visible;
      margin-bottom: 1.6rem;
      z-index: 1;
    }
    .cat-img {
      width: 100%;
      height: auto;
      display: block;
      transition: max-width 0.3s ease;
    }

    /* ── 脈輪群組基底 ── */
    .chakra-group {
      position: absolute;
      cursor: pointer;
      width: 28px;
      height: 28px;
      transform: translate(-50%, -50%);
      overflow: visible;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      border-radius: 50%;
    }
    /* 隱形擴大觸控區域（不影響視覺） */
    .chakra-group::before {
      content: '';
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 50%;
    }

    .chakra-group:not(.active):hover {
      transform: translate(-50%, -50%) scale(1.15);
    }

    /* ── 光點 — 預設呼吸動畫 ── */
    .chakra-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--ck-color);
      border: 1.2px solid rgba(255,255,255,0.55);
      position: relative;
      z-index: 2;
      box-shadow: 0 0 6px var(--ck-color);
      transition: all 0.22s ease;
      animation: chakra-breath 3s ease-in-out infinite;
    }

    /* 呼吸動畫 */
    @keyframes chakra-breath {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 6px var(--ck-color), 0 0 12px rgba(255,255,255,0.1);
      }
      50% {
        transform: scale(1.15);
        box-shadow: 0 0 10px var(--ck-color), 0 0 20px rgba(255,255,255,0.15);
      }
    }

    .chakra-group:not(.active):hover .chakra-dot {
      transform: scale(1.8);
      box-shadow: 0 0 16px var(--ck-color), 0 0 32px rgba(255,255,255,0.2);
      animation: none;
    }

    /* ── 環（選中時光暈） ── */
    .chakra-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid var(--ck-color);
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s ease;
    }

    /* 選中時的波紋光暈 */
    .chakra-group.active .chakra-ring {
      opacity: 0.6;
      animation: chakra-ripple 2s ease-out infinite;
    }

    @keyframes chakra-ripple {
      0% {
        transform: scale(1);
        opacity: 0.6;
      }
      100% {
        transform: scale(1.8);
        opacity: 0;
      }
    }

    /* 點擊閃光效果 */
    .chakra-dot.flash {
      animation: chakra-flash 0.5s ease-out;
    }

    @keyframes chakra-flash {
      0% {
        transform: scale(1);
        box-shadow: 0 0 8px var(--ck-color), 0 0 20px var(--ck-color);
      }
      50% {
        transform: scale(1.3);
        box-shadow: 0 0 20px var(--ck-color), 0 0 40px rgba(255,255,255,0.4);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 6px var(--ck-color), 0 0 12px rgba(255,255,255,0.1);
      }
    }

    /* ══════════════════════════════════════
       0. 海底輪 — 扎根入地
       光點向下穩定發光；根絲由 JS 注入
    ══════════════════════════════════════ */
    .chakra-group[data-i="0"].active .chakra-dot {
      animation: root-dot 3s ease-in-out infinite;
    }
    @keyframes root-dot {
      0%, 100% { transform: scale(1.3); box-shadow: 0 0 10px #BF4A42, 0 10px 22px rgba(190,65,58,0.48); }
      50%       { transform: scale(1.4); box-shadow: 0 0 20px #BF4A42, 0 16px 38px rgba(190,65,58,0.58); }
    }

    /* 根絲樣式（JS 動態注入） */
    .root-strand {
      position: absolute;
      left: 50%;
      top: 50%;
      margin-left: calc(var(--w, 2px) / -2);
      width: var(--w, 2px);
      height: 0;
      background: linear-gradient(
        to bottom,
        rgba(200, 70, 62, 0.95)  0%,
        rgba(200, 70, 62, 0.75) 35%,
        rgba(200, 70, 62, 0.3)  70%,
        rgba(200, 70, 62, 0)   100%
      );
      transform-origin: top center;
      border-radius: 2px;
      pointer-events: none;
      filter: blur(var(--blur, 0.6px));
      animation: root-flow var(--dur) ease-in-out infinite var(--delay);
    }
    @keyframes root-flow {
      0%         { height: 0;          opacity: 0;    }
      18%        { height: var(--len); opacity: 1;    }
      38%        { height: var(--len); opacity: 0.5;  }
      55%        { height: var(--len); opacity: 0.85; }
      78%        { height: var(--len); opacity: 0.38; }
      100%       { height: var(--len); opacity: 0;    }
    }

    /* ══════════════════════════════════════
       1. 臍輪 — 柔和左右流動
    ══════════════════════════════════════ */
    .chakra-group[data-i="1"].active .chakra-dot {
      animation: sacral-sway 3s ease-in-out infinite;
    }
    @keyframes sacral-sway {
      0%, 100% { transform: scale(1.3) translateX(0);     box-shadow:  0px 0 12px #C9976C; }
      30%       { transform: scale(1.3) translateX(-4px);  box-shadow: -5px 0 15px #C9976C; }
      70%       { transform: scale(1.3) translateX( 4px);  box-shadow:  5px 0 15px #C9976C; }
    }
    .chakra-group[data-i="1"].active .chakra-ring.r1 {
      animation: sacral-ring 3s ease-in-out infinite;
    }
    .chakra-group[data-i="1"].active .chakra-ring.r2 {
      animation: sacral-ring 3s ease-in-out infinite 1.5s;
    }
    @keyframes sacral-ring {
      0%, 100% { transform: scale(2.2) translateX(0);     opacity: 0.28; }
      30%       { transform: scale(2.2) translateX(-5px);  opacity: 0.16; }
      70%       { transform: scale(2.2) translateX( 5px);  opacity: 0.16; }
    }

    /* ══════════════════════════════════════
       2. 太陽神經叢 — 脈衝力量
    ══════════════════════════════════════ */
    .chakra-group[data-i="2"].active .chakra-dot {
      animation: solar-pulse 2.5s ease-in-out infinite;
    }
    @keyframes solar-pulse {
      0%, 100% { transform: scale(1.3); box-shadow: 0 0 8px #C9B86A; }
      45%       { transform: scale(1.75); box-shadow: 0 0 28px #C9B86A, 0 0 52px rgba(201,184,106,0.26); }
    }
    .chakra-group[data-i="2"].active .chakra-ring.r1 {
      animation: solar-ring 2.5s ease-out infinite;
    }
    .chakra-group[data-i="2"].active .chakra-ring.r2 {
      animation: solar-ring 2.5s ease-out infinite 0.85s;
    }
    @keyframes solar-ring {
      0%   { transform: scale(1); opacity: 0.72; }
      100% { transform: scale(4.2); opacity: 0; }
    }

    /* ══════════════════════════════════════
       3. 心輪 — 霧感向外擴散
    ══════════════════════════════════════ */
    .chakra-group[data-i="3"].active .chakra-dot {
      animation: heart-breathe 3s ease-in-out infinite;
    }
    @keyframes heart-breathe {
      0%, 100% { transform: scale(1.3); box-shadow: 0 0 13px rgba(125,175,136,0.85), 0 0 30px rgba(125,175,136,0.2); }
      50%       { transform: scale(1.55); box-shadow: 0 0 26px rgba(125,175,136,0.9), 0 0 60px rgba(125,175,136,0.16); }
    }
    .chakra-group[data-i="3"].active .chakra-ring.r1 {
      animation: heart-fog 3s ease-out infinite;
      filter: blur(2.5px);
      border-width: 3px;
    }
    .chakra-group[data-i="3"].active .chakra-ring.r2 {
      animation: heart-fog 3s ease-out infinite 1.5s;
      filter: blur(2.5px);
      border-width: 3px;
    }
    @keyframes heart-fog {
      0%   { transform: scale(1);   opacity: 0.6; }
      100% { transform: scale(5.8); opacity: 0;   }
    }

    /* ══════════════════════════════════════
       4. 喉輪 — 聲波輕微震動
    ══════════════════════════════════════ */
    .chakra-group[data-i="4"].active .chakra-dot {
      animation: throat-vibrate 2.6s ease-in-out infinite;
    }
    @keyframes throat-vibrate {
      0%,  100% { transform: scale(1.3) translateX(0);      box-shadow: 0 0 9px #7AA2C4; }
      15%        { transform: scale(1.3) translateX( 1.5px); }
      35%        { transform: scale(1.3) translateX(-1.5px); }
      55%        { transform: scale(1.3) translateX( 1px);   }
      75%        { transform: scale(1.3) translateX(-1px);   box-shadow: 0 0 16px #7AA2C4; }
    }
    /* 橢圓波紋（模擬聲波） */
    .chakra-group[data-i="4"].active .chakra-ring.r1 {
      animation: throat-wave 2.6s ease-out infinite;
    }
    .chakra-group[data-i="4"].active .chakra-ring.r2 {
      animation: throat-wave 2.6s ease-out infinite 1.1s;
    }
    @keyframes throat-wave {
      0%   { transform: scaleX(1.9) scaleY(0.85) scale(1);   opacity: 0.55; }
      100% { transform: scaleX(1.9) scaleY(0.85) scale(3);   opacity: 0;    }
    }

    /* ══════════════════════════════════════
       5. 眉心輪 — 由外往內聚焦
    ══════════════════════════════════════ */
    .chakra-group[data-i="5"].active .chakra-dot {
      animation: thirdeye-hold 3s ease-in-out infinite;
    }
    @keyframes thirdeye-hold {
      0%, 100% { transform: scale(1.3);  box-shadow: 0 0 7px #7A7AAF, 0 0 18px rgba(122,122,175,0.4); }
      50%       { transform: scale(1.2);  box-shadow: 0 0 5px #7A7AAF, 0 0 8px rgba(122,122,175,0.7); }
    }
    /* 環從外收攏進來 */
    .chakra-group[data-i="5"].active .chakra-ring.r1 {
      animation: thirdeye-in 3s ease-in-out infinite;
    }
    .chakra-group[data-i="5"].active .chakra-ring.r2 {
      animation: thirdeye-in 3s ease-in-out infinite 1.5s;
    }
    @keyframes thirdeye-in {
      0%   { transform: scale(3.8); opacity: 0;    }
      30%  {                         opacity: 0.45; }
      85%  { transform: scale(1.1); opacity: 0.2;  }
      100% { transform: scale(1.1); opacity: 0;    }
    }

    /* ══════════════════════════════════════
       6. 頂輪 — 光柱向上，粒子漂浮
       光柱與粒子由 JS 注入
    ══════════════════════════════════════ */
    .chakra-group[data-i="6"].active .chakra-dot {
      animation: crown-glow 3s ease-in-out infinite;
    }
    @keyframes crown-glow {
      0%, 100% { transform: scale(1.3); box-shadow: 0 0 12px #A882C2, 0 -10px 28px rgba(168,130,194,0.38); }
      50%       { transform: scale(1.5); box-shadow: 0 0 22px #A882C2, 0 -22px 50px rgba(168,130,194,0.48); }
    }
    .chakra-group[data-i="6"].active .chakra-ring.r1 {
      animation: crown-ring 3s ease-out infinite;
    }
    @keyframes crown-ring {
      0%   { transform: scale(1);   opacity: 0.5; }
      100% { transform: scale(3.2); opacity: 0;   }
    }

    /* 光柱（JS 注入） */
    .crown-beam {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform: translateX(-50%);
      width: 4px;
      border-radius: 3px;
      background: linear-gradient(to top, rgba(168,130,194,0.7), rgba(168,130,194,0));
      pointer-events: none;
      animation: crown-beam-breathe 3s ease-in-out infinite;
    }
    @keyframes crown-beam-breathe {
      0%, 100% { height: 38px; opacity: 0.48; }
      50%       { height: 60px; opacity: 0.72; }
    }

    /* 粒子（JS 注入） */
    .crown-particle {
      position: absolute;
      border-radius: 50%;
      background: #A882C2;
      pointer-events: none;
      animation: crown-float linear forwards;
    }
    @keyframes crown-float {
      0%   { opacity: 0.75; transform: translateY(0) translateX(0) scale(1); }
      100% { opacity: 0;    transform: translateY(-72px) translateX(var(--drift)) scale(0.15); }
    }

    /* ── 提示文字 ── */
    .hint {
      margin-top: 1.4rem;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      color: rgba(138, 112, 96, 0.55);
      text-align: center;
      transition: opacity 0.5s ease;
      font-weight: 300;
      animation: hint-breathe 3.5s ease-in-out 0.6s infinite;
      position: relative;
      z-index: 1;
      line-height: 1.6;
    }
    @keyframes hint-breathe {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 0.75; }
      100% { opacity: 0.7; }
    }

    /* ══════════════════════════
       卡片
    ══════════════════════════ */
    .card-wrap {
      width: 100%;
      max-width: 320px;
      margin-top: 2.6rem;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.52s ease, transform 0.52s ease;
      pointer-events: none;
      position: relative;
      z-index: 1;
    }
    .card-wrap.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .card {
      background: linear-gradient(160deg, rgba(255,253,250,0.98) 0%, rgba(245,238,255,0.92) 100%);
      border-radius: 18px;
      border: 1px solid rgba(160, 130, 200, 0.22);
      box-shadow:
        inset 3px 0 0 0 var(--lavender),
        0 12px 36px rgba(120, 90, 160, 0.12),
        0 3px 10px rgba(0,0,0,0.06);
      overflow: hidden;
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(196, 170, 223, 0.55), transparent);

// ════════════════════════════════════════
//  工具
// ════════════════════════════════════════
function pageTint(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const base = [244,243,246];
  const t = 0.10;
  return `rgb(${Math.round(base[0]+(r-base[0])*t)},${Math.round(base[1]+(g-base[1])*t)},${Math.round(base[2]+(b-base[2])*t)})`;
}

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ════════════════════════════════════════
//  特效：海底輪 — 根絲
// ════════════════════════════════════════
function startRoots(group) {
  const config = [
    { angle: -24, len: 44, w: 1.5, blur: 0.8, dur: 2.8, delay: 0.1  },
    { angle: -10, len: 56, w: 2.0, blur: 0.5, dur: 3.0, delay: 0.45 },
    { angle:   0, len: 68, w: 3.0, blur: 0.3, dur: 2.9, delay: 0    },
    { angle:  10, len: 56, w: 2.0, blur: 0.5, dur: 3.0, delay: 0.45 },
    { angle:  24, len: 44, w: 1.5, blur: 0.8, dur: 2.8, delay: 0.1  },
  ];
  config.forEach(({ angle, len, w, blur, dur, delay }) => {
    const strand = document.createElement('div');
    strand.className = 'root-strand';
    strand.style.setProperty('--len',   len  + 'px');
    strand.style.setProperty('--w',     w    + 'px');
    strand.style.setProperty('--blur',  blur + 'px');
    strand.style.setProperty('--dur',   dur  + 's');
    strand.style.setProperty('--delay', delay + 's');
    strand.style.transform = `rotate(${angle}deg)`;
    group.appendChild(strand);
  });
}

function stopRoots(group) {
  group.querySelectorAll('.root-strand').forEach(el => el.remove());
}

// ════════════════════════════════════════
//  特效：頂輪 — 光柱 ＋ 粒子
// ════════════════════════════════════════
let crownTimer = null;

function startCrownEffect(group) {
  // 光柱
  const beam = document.createElement('div');
  beam.className = 'crown-beam';
  group.appendChild(beam);

  // 持續噴出粒子
  function spawnParticle() {
    if (!group.classList.contains('active')) return;
    const p = document.createElement('div');
    p.className = 'crown-particle';
    const size    = 1.5 + Math.random() * 2.5;
    const drift   = (Math.random() - 0.5) * 22;
    const dur     = 2.2 + Math.random() * 1.4;
    const offsetX = (Math.random() - 0.5) * 8;
    p.style.width  = size + 'px';
    p.style.height = size + 'px';
    p.style.left   = `calc(50% + ${offsetX}px)`;
    p.style.top    = '50%';
    p.style.opacity = 0.55 + Math.random() * 0.3;
    p.style.setProperty('--drift', drift + 'px');
    p.style.animationDuration = dur + 's';
    group.appendChild(p);
    setTimeout(() => p.remove(), dur * 1000);
  }

  spawnParticle();
  crownTimer = setInterval(spawnParticle, 480);
}

function stopCrownEffect(group) {
  clearInterval(crownTimer);
  crownTimer = null;
  group.querySelectorAll('.crown-beam, .crown-particle').forEach(el => el.remove());
}

// ════════════════════════════════════════
//  特效：啟動 / 停止 分派
// ════════════════════════════════════════
function startEffect(group, i) {
  if (i === 0) startRoots(group);
  if (i === 6) startCrownEffect(group);
}

function stopEffect(group, i) {
  if (i === 0) stopRoots(group);
  if (i === 6) stopCrownEffect(group);
}

//  顯示卡片
// ════════════════════════════════════════
let activeI = -1;
const cardWrap = document.getElementById('cardWrap');
const hint     = document.getElementById('hint');

function showCard(i) {
  const c = chakras[i];
  const def = DEFAULTS[i];
  const descs   = c.descs   || def.descs;
  const actions = c.actions || def.actions;
  const r = Math.floor(Math.random() * descs.length);

  document.getElementById('cardStrip').style.background   = c.color;
  document.getElementById('cardDotIcon').style.background = c.color;
  // 設定卡片背景色暈為脈輪色
  const cardEl = document.getElementById('cardWrap');
  cardEl.style.setProperty('--card-tint', hexAlpha(c.color, 0.10));
  document.getElementById('cardName').textContent          = c.name;
  document.getElementById('cardEn').textContent            = c.en;
  const pickedDesc   = descs[r];
  const pickedAction = actions[r];
  document.getElementById('cardDesc').textContent   = pickedDesc;
  document.getElementById('cardAction').textContent = pickedAction;
  // store for share handlers
  document.getElementById('cardWrap').dataset.desc   = pickedDesc;
  document.getElementById('cardWrap').dataset.action = pickedAction;

  const statesEl = document.getElementById('cardStates');
  statesEl.innerHTML = '';

  function makeStateRow(label, words, type) {
    const row = document.createElement('div');
    row.className = 'state-row';
    const lbl = document.createElement('span');
    lbl.className = 'state-label';
    lbl.textContent = label;
    row.appendChild(lbl);
    const tags = document.createElement('div');
    tags.className = 'state-tags';
    words.forEach(w => {
      const tag = document.createElement('span');
      tag.className = `state-tag ${type}`;
      tag.textContent = w;
      if (type === 'flow') {
        tag.style.background = hexAlpha(c.color, 0.75);
      } else {
        tag.style.border = `1px solid ${hexAlpha(c.color, 0.45)}`;
        tag.style.color  = hexAlpha(c.color, 0.85);
      }
      tags.appendChild(tag);
    });
    row.appendChild(tags);
    return row;
  }

  statesEl.appendChild(makeStateRow('順流', c.flow, 'flow'));
  statesEl.appendChild(makeStateRow('失衡', c.imbalance, 'imbalance'));

  // ── 延伸閱讀 ──
  const extra = c.extra || DEFAULTS[i].extra;
  const extraEl = document.getElementById('cardExtra');
  extraEl.innerHTML = '';

  const toggle = document.createElement('button');
  toggle.className = 'card-extra-toggle';
  toggle.innerHTML = `這隻脈輪貓還有話想跟你說 <span class="card-extra-arrow">▸</span>`;

  const body = document.createElement('div');
  body.className = 'card-extra-body';

  // 位置 + 元素
  const metaRow = document.createElement('div');
  metaRow.className = 'extra-meta';
  function metaItem(label, val) {
    if (!val) return null;
    const item = document.createElement('div');
    item.className = 'extra-meta-item';
    item.innerHTML = `<span class="extra-meta-label">${label}</span><span class="extra-meta-value">${val}</span>`;
    return item;
  }
  const posItem = metaItem('位置', extra.position);
  const elItem  = metaItem('元素', extra.element);
  if (posItem) metaRow.appendChild(posItem);
  if (elItem)  metaRow.appendChild(elItem);
  body.appendChild(metaRow);

  // 能量理解 / 轉化方向
  function extraSection(label, text) {
    const sec = document.createElement('div');
    sec.innerHTML = `<div class="extra-section-label">${label}</div><div class="extra-section-text">${text}</div>`;
    return sec;
  }
  body.appendChild(extraSection('能量理解', extra.insight));
  body.appendChild(extraSection('轉化方向', extra.transform));
  if (extra.meditation) {
    body.appendChild(extraSection('冥想提示', extra.meditation));
  }

  toggle.addEventListener('click', () => {
    toggle.classList.toggle('open');
    body.classList.toggle('open');
  });

  extraEl.appendChild(toggle);
  extraEl.appendChild(body);

  // LINE 分享按鈕
  let shareBtn = document.getElementById('lineShareBtn');
  if (!shareBtn) {
    shareBtn = document.createElement('button');
    shareBtn.id = 'lineShareBtn';
    shareBtn.className = 'line-share-btn';
    shareBtn.textContent = '分享到 LINE ↗';
    shareBtn.addEventListener('click', async () => {
      const cur = chakras[activeI];
      shareBtn.textContent = '傳送中…';
      shareBtn.disabled = true;
      try {
        const cardEl = document.getElementById('cardWrap');
        await shareToLine(buildChakraFlexMessage([{
          name: cur.name, en: cur.en, color: cur.color,
          desc: cardEl.dataset.desc, extra: cur.extra
        }]));
      } catch(e) {}
      shareBtn.textContent = '分享到 LINE ↗';
      shareBtn.disabled = false;
    });
  }
  extraEl.appendChild(shareBtn);

  // IG 分享按鈕
  let igBtn = document.getElementById('igShareBtn');
  if (!igBtn) {
    igBtn = document.createElement('button');
    igBtn.id = 'igShareBtn';
    igBtn.className = 'line-share-btn';
    igBtn.style.cssText = 'border-color: rgba(193,53,132,0.5); color: #C13584;';
    igBtn.textContent = '分享到 IG ↗';
    igBtn.addEventListener('click', async () => {
      const cur = chakras[activeI];
      igBtn.textContent = '準備中…';
      igBtn.disabled = true;
      try {
        const cardEl = document.getElementById('cardWrap');
        await shareToInstagram(cur.name, cardEl.dataset.desc || '', cur.color, cardEl.dataset.action || '');
      } catch(e) {}
      igBtn.textContent = '分享到 IG ↗';
      igBtn.disabled = false;
    });
  }
  extraEl.appendChild(igBtn);

  document.body.style.backgroundColor = pageTint(c.color);

  cardWrap.classList.remove('visible');
  void cardWrap.offsetWidth;
  cardWrap.classList.add('visible');

  hint.style.opacity = '0';
  setTimeout(() => cardWrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);
}

// ════════════════════════════════════════
//  點擊脈輪
// ════════════════════════════════════════
document.querySelectorAll('.chakra-group').forEach(g => {
  g.addEventListener('click', () => {
    const i = parseInt(g.dataset.i);

    // 關閉上一個特效
    const prevActive = document.querySelector('.chakra-group.active');
    if (prevActive) {
      stopEffect(prevActive, parseInt(prevActive.dataset.i));
      prevActive.classList.remove('active');
    }

    // 點同一個 → 收回
    if (activeI === i) {
      activeI = -1;
      cardWrap.classList.remove('visible');
      document.body.style.backgroundColor = '#f5f3ef';
      hint.style.opacity = '1';
      return;
    }

    activeI = i;
    g.classList.add('active');
    // 觸發點擊閃光效果
    const dot = g.querySelector('.chakra-dot');
    if (dot) {
      dot.classList.add('flash');
      setTimeout(() => dot.classList.remove('flash'), 500);
    }
    startEffect(g, i);
    showCard(i);
  });
});
