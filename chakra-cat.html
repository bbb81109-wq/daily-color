<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>脈輪貓</title>
  <meta name="theme-color" content="#faf9ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="每日色彩">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="liff.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #faf9ff 0%, #f5f8ff 100%);
      transition: background-color 1.4s ease;
      font-family: "Noto Serif TC", Georgia, serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem 5rem;
      color: #4a3f73;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 300px at 30% 20%, rgba(255, 182, 193, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse 500px 300px at 70% 15%, rgba(147, 112, 219, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 600px 350px at 80% 80%, rgba(135, 206, 235, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── 返回 ── */
    .back-link {
      position: fixed;
      top: 1.2rem;
      left: 1.4rem;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      color: #9b8db5;
      text-decoration: none;
      transition: color 0.2s;
      z-index: 10;
    }
    .back-link:hover { color: #6b5b95; }

    /* ── 標題 ── */
    .header {
      text-align: center;
      margin-bottom: 3rem;
      position: relative;
      z-index: 1;
    }
    .header h1 {
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.45em;
      color: #6b5b95;
    }
    .header p {
      margin-top: 0.6rem;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      color: #9b8db5;
      line-height: 1.8;
    }

    /* ── 黑貓 ── */
    .cat-wrap {
      width: 100%;
      max-width: min(90vw, 400px);
      flex-shrink: 0;
      position: relative;
      overflow: visible;
      margin-bottom: 1rem;
    }
    .cat-img {
      width: 100%;
      height: auto;
      display: block;
      transition: max-width 0.3s ease;
    }

    /* ── 脈輪群組基底 ── */
    .chakra-group {
      position: absolute;
      cursor: pointer;
      width: 28px;
      height: 28px;
      transform: translate(-50%, -50%);
      overflow: visible;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      border-radius: 50%;
    }

    .chakra-group:not(.active):hover {
      transform: translate(-50%, -50%) scale(1.15);
    }

    /* ── 光點 ── */
    .chakra-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--ck-color);
      border: 1.2px solid rgba(255,255,255,0.55);
      position: relative;
      z-index: 2;
      box-shadow: 0 0 6px var(--ck-color);
      transition: all 0.22s ease;
    }
    .chakra-group:not(.active):hover .chakra-dot {
      transform: scale(1.8);
      box-shadow: 0 0 16px var(--ck-color), 0 0 32px rgba(255,255,255,0.2);
    }

    /* ── 環（預設隱藏） ── */
    .chakra-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid var(--ck-color);
      opacity: 0;
      pointer-events: none;
    }

    /* ══════════════════════════════════════
       0. 海底輪 — 扎根入地
       光點向下穩定發光；根絲由 JS 注入
    ══════════════════════════════════════ */
    .chakra-group[data-i="0"].active .chakra-dot {
      animation: root-dot 3s ease-in-out infinite;
    }
    @keyframes root-dot {
      0%, 100% { transform: scale(1.3); box-shadow: 0 0 10px #BF4A42, 0 10px 22px rgba(190,65,58,0.48); }
      50%       { transform: scale(1.4); box-shadow: 0 0 20px #BF4A42, 0 16px 38px rgba(190,65,58,0.58); }
    }

    /* 根絲樣式（JS 動態注入） */
    .root-strand {
      position: absolute;
      left: 50%;
      top: 50%;
      margin-left: calc(var(--w, 2px) / -2);
      width: var(--w, 2px);
      height: 0;
      background: linear-gradient(
        to bottom,
        rgba(200, 70, 62, 0.95)  0%,
        rgba(200, 70, 62, 0.75) 35%,
        rgba(200, 70, 62, 0.3)  70%,
        rgba(200, 70, 62, 0)   100%
      );
      transform-origin: top center;
      border-radius: 2px;
      pointer-events: none;
      filter: blur(var(--blur, 0.6px));
      animation: root-flow var(--dur) ease-in-out infinite var(--delay);
    }
    @keyframes root-flow {
      0%         { height: 0;          opacity: 0;    }
      18%        { height: var(--len); opacity: 1;    }
      38%        { height: var(--len); opacity: 0.5;  }
      55%        { height: var(--len); opacity: 0.85; }
      78%        { height: var(--len); opacity: 0.38; }
      100%       { height: var(--len); opacity: 0;    }
    }

    /* ══════════════════════════════════════
       1. 臍輪 — 柔和左右流動
    ══════════════════════════════════════ */
    .chakra-group[data-i="1"].active .chakra-dot {
      animation: sacral-sway 3s ease-in-out infinite;
    }
    @keyframes sacral-sway {
      0%, 100% { transform: scale(1.3) translateX(0);     box-shadow:  0px 0 12px #C9976C; }
      30%       { transform: scale(1.3) translateX(-4px);  box-shadow: -5px 0 15px #C9976C; }
      70%       { transform: scale(1.3) translateX( 4px);  box-shadow:  5px 0 15px #C9976C; }
    }
    .chakra-group[data-i="1"].active .chakra-ring.r1 {
      animation: sacral-ring 3s ease-in-out infinite;
    }
    .chakra-group[data-i="1"].active .chakra-ring.r2 {
      animation: sacral-ring 3s ease-in-out infinite 1.5s;
    }
    @keyframes sacral-ring {
      0%, 100% { transform: scale(2.2) translateX(0);     opacity: 0.28; }
      30%       { transform: scale(2.2) translateX(-5px);  opacity: 0.16; }
      70%       { transform: scale(2.2) translateX( 5px);  opacity: 0.16; }
    }

    /* ══════════════════════════════════════
       2. 太陽神經叢 — 脈衝力量
    ══════════════════════════════════════ */
    .chakra-group[data-i="2"].active .chakra-dot {
      animation: solar-pulse 2.5s ease-in-out infinite;
    }
    @keyframes solar-pulse {
      0%, 100% { transform: scale(1.3); box-shadow: 0 0 8px #C9B86A; }
      45%       { transform: scale(1.75); box-shadow: 0 0 28px #C9B86A, 0 0 52px rgba(201,184,106,0.26); }
    }
    .chakra-group[data-i="2"].active .chakra-ring.r1 {
      animation: solar-ring 2.5s ease-out infinite;
    }
    .chakra-group[data-i="2"].active .chakra-ring.r2 {
      animation: solar-ring 2.5s ease-out infinite 0.85s;
    }
    @keyframes solar-ring {
      0%   { transform: scale(1); opacity: 0.72; }
      100% { transform: scale(4.2); opacity: 0; }
    }

    /* ══════════════════════════════════════
       3. 心輪 — 霧感向外擴散
    ══════════════════════════════════════ */
    .chakra-group[data-i="3"].active .chakra-dot {
      animation: heart-breathe 3s ease-in-out infinite;
    }
    @keyframes heart-breathe {
      0%, 100% { transform: scale(1.3); box-shadow: 0 0 13px rgba(125,175,136,0.85), 0 0 30px rgba(125,175,136,0.2); }
      50%       { transform: scale(1.55); box-shadow: 0 0 26px rgba(125,175,136,0.9), 0 0 60px rgba(125,175,136,0.16); }
    }
    .chakra-group[data-i="3"].active .chakra-ring.r1 {
      animation: heart-fog 3s ease-out infinite;
      filter: blur(2.5px);
      border-width: 3px;
    }
    .chakra-group[data-i="3"].active .chakra-ring.r2 {
      animation: heart-fog 3s ease-out infinite 1.5s;
      filter: blur(2.5px);
      border-width: 3px;
    }
    @keyframes heart-fog {
      0%   { transform: scale(1);   opacity: 0.6; }
      100% { transform: scale(5.8); opacity: 0;   }
    }

    /* ══════════════════════════════════════
       4. 喉輪 — 聲波輕微震動
    ══════════════════════════════════════ */
    .chakra-group[data-i="4"].active .chakra-dot {
      animation: throat-vibrate 2.6s ease-in-out infinite;
    }
    @keyframes throat-vibrate {
      0%,  100% { transform: scale(1.3) translateX(0);      box-shadow: 0 0 9px #7AA2C4; }
      15%        { transform: scale(1.3) translateX( 1.5px); }
      35%        { transform: scale(1.3) translateX(-1.5px); }
      55%        { transform: scale(1.3) translateX( 1px);   }
      75%        { transform: scale(1.3) translateX(-1px);   box-shadow: 0 0 16px #7AA2C4; }
    }
    /* 橢圓波紋（模擬聲波） */
    .chakra-group[data-i="4"].active .chakra-ring.r1 {
      animation: throat-wave 2.6s ease-out infinite;
    }
    .chakra-group[data-i="4"].active .chakra-ring.r2 {
      animation: throat-wave 2.6s ease-out infinite 1.1s;
    }
    @keyframes throat-wave {
      0%   { transform: scaleX(1.9) scaleY(0.85) scale(1);   opacity: 0.55; }
      100% { transform: scaleX(1.9) scaleY(0.85) scale(3);   opacity: 0;    }
    }

    /* ══════════════════════════════════════
       5. 眉心輪 — 由外往內聚焦
    ══════════════════════════════════════ */
    .chakra-group[data-i="5"].active .chakra-dot {
      animation: thirdeye-hold 3s ease-in-out infinite;
    }
    @keyframes thirdeye-hold {
      0%, 100% { transform: scale(1.3);  box-shadow: 0 0 7px #7A7AAF, 0 0 18px rgba(122,122,175,0.4); }
      50%       { transform: scale(1.2);  box-shadow: 0 0 5px #7A7AAF, 0 0 8px rgba(122,122,175,0.7); }
    }
    /* 環從外收攏進來 */
    .chakra-group[data-i="5"].active .chakra-ring.r1 {
      animation: thirdeye-in 3s ease-in-out infinite;
    }
    .chakra-group[data-i="5"].active .chakra-ring.r2 {
      animation: thirdeye-in 3s ease-in-out infinite 1.5s;
    }
    @keyframes thirdeye-in {
      0%   { transform: scale(3.8); opacity: 0;    }
      30%  {                         opacity: 0.45; }
      85%  { transform: scale(1.1); opacity: 0.2;  }
      100% { transform: scale(1.1); opacity: 0;    }
    }

    /* ══════════════════════════════════════
       6. 頂輪 — 光柱向上，粒子漂浮
       光柱與粒子由 JS 注入
    ══════════════════════════════════════ */
    .chakra-group[data-i="6"].active .chakra-dot {
      animation: crown-glow 3s ease-in-out infinite;
    }
    @keyframes crown-glow {
      0%, 100% { transform: scale(1.3); box-shadow: 0 0 12px #A882C2, 0 -10px 28px rgba(168,130,194,0.38); }
      50%       { transform: scale(1.5); box-shadow: 0 0 22px #A882C2, 0 -22px 50px rgba(168,130,194,0.48); }
    }
    .chakra-group[data-i="6"].active .chakra-ring.r1 {
      animation: crown-ring 3s ease-out infinite;
    }
    @keyframes crown-ring {
      0%   { transform: scale(1);   opacity: 0.5; }
      100% { transform: scale(3.2); opacity: 0;   }
    }

    /* 光柱（JS 注入） */
    .crown-beam {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform: translateX(-50%);
      width: 4px;
      border-radius: 3px;
      background: linear-gradient(to top, rgba(168,130,194,0.7), rgba(168,130,194,0));
      pointer-events: none;
      animation: crown-beam-breathe 3s ease-in-out infinite;
    }
    @keyframes crown-beam-breathe {
      0%, 100% { height: 38px; opacity: 0.48; }
      50%       { height: 60px; opacity: 0.72; }
    }

    /* 粒子（JS 注入） */
    .crown-particle {
      position: absolute;
      border-radius: 50%;
      background: #A882C2;
      pointer-events: none;
      animation: crown-float linear forwards;
    }
    @keyframes crown-float {
      0%   { opacity: 0.75; transform: translateY(0) translateX(0) scale(1); }
      100% { opacity: 0;    transform: translateY(-72px) translateX(var(--drift)) scale(0.15); }
    }

    /* ── 提示文字 ── */
    .hint {
      margin-top: 1.8rem;
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      color: #ccc;
      text-align: center;
      transition: opacity 0.5s ease;
    }

    /* ══════════════════════════
       卡片
    ══════════════════════════ */
    .card-wrap {
      width: 100%;
      max-width: 320px;
      margin-top: 2.6rem;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.52s ease, transform 0.52s ease;
      pointer-events: none;
    }
    .card-wrap.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .card {
      background: #fefefc;
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.055), 0 1px 4px rgba(0,0,0,0.035);
      overflow: hidden;
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,100,200,0.3), transparent);
      z-index: 1;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(147,112,219,0.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(200,180,255,0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .card-strip {
      height: 3px;
      transition: background 0.5s ease;
      position: relative;
      z-index: 2;
    }

    .card-body {
      padding: 1.8rem 1.8rem 1.6rem;
      position: relative;
      z-index: 2;
    }

    .card-head {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.4rem;
    }
    .card-dot-icon {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.5s ease;
      box-shadow: 0 0 6px currentColor;
    }
    .card-name {
      font-size: 1.15rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      line-height: 1.4;
      color: #6b5b95;
    }
    .card-en {
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      color: #b5a9c9;
      margin-top: 0.2rem;
      font-style: italic;
    }

    .card-states {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      margin-bottom: 1.4rem;
    }
    .state-row {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex-wrap: wrap;
    }
    .state-label {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: #c5c0b8;
      flex-shrink: 0;
      width: 2.4rem;
    }
    .state-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .state-tag {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      padding: 0.2rem 0.62rem;
      border-radius: 50px;
    }
    .state-tag.flow {
      color: #fff;
      opacity: 0.88;
    }
    .state-tag.imbalance {
      background: transparent !important;
      opacity: 0.7;
    }

    .card-rule {
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(147,112,219,0.3), transparent);
      margin: 1.3rem 0;
    }

    .card-desc-label {
      font-size: 0.66rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-weight: 600;
      color: #9b8db5;
      margin-bottom: 0.7rem;
    }
    .card-desc {
      font-size: 0.95rem;
      line-height: 2.15;
      letter-spacing: 0.055em;
      color: #6b5b95;
      margin-bottom: 1.4rem;
      white-space: pre-line;
      padding: 0.8rem 1rem;
      background: rgba(220,200,255,0.2);
      border-radius: 10px;
    }

    .card-action-label {
      font-size: 0.66rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-weight: 600;
      color: #9b8db5;
      margin-bottom: 0.7rem;
    }
    .card-action {
      font-size: 0.88rem;
      line-height: 2;
      letter-spacing: 0.05em;
      color: #6b5b95;
      padding: 0.8rem 1rem;
      background: rgba(220,200,255,0.15);
      border-left: 3px solid rgba(147,112,219,0.4);
      border-radius: 8px;
    }

    /* ── LINE 分享按鈕 ── */
    .line-share-btn {
      display: block;
      width: fit-content;
      margin: 1.2rem auto 0;
      background: transparent;
      border: 1px solid #06C755;
      color: #06C755;
      font-family: inherit;
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      padding: 0.45rem 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.25s;
    }
    .line-share-btn:hover { background: #06C755; color: #fff; }


    /* ══════════════════════════
       延伸閱讀區塊
    ══════════════════════════ */
    .card-extra {
      margin-top: 1.2rem;
      border-top: 1px solid #ece8e2;
      padding-top: 0.85rem;
    }
    .card-extra-toggle {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: #c8c3bc;
      padding: 0;
      transition: color 0.2s;
    }
    .card-extra-toggle:hover { color: #999; }
    .card-extra-arrow {
      font-size: 0.5rem;
      display: inline-block;
      transition: transform 0.25s ease;
    }
    .card-extra-toggle.open .card-extra-arrow { transform: rotate(90deg); }

    .card-extra-body {
      display: none;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1rem;
    }
    .card-extra-body.open { display: flex; }

    .extra-meta {
      display: flex;
      gap: 1.8rem;
    }
    .extra-meta-item {
      display: flex;
      flex-direction: column;
      gap: 0.18rem;
    }
    .extra-meta-label {
      font-size: 0.55rem;
      letter-spacing: 0.28em;
      color: #d0cbc4;
    }
    .extra-meta-value {
      font-size: 0.76rem;
      letter-spacing: 0.1em;
      color: #8a8580;
    }
    .extra-section-label {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: #d0cbc4;
      margin-bottom: 0.38rem;
    }
    .extra-section-text {
      font-size: 0.78rem;
      line-height: 2;
      letter-spacing: 0.05em;
      color: #8a8580;
      white-space: pre-line;
    }

    /* ════════════════════════════════════════
       響應式優化 — 手機、平板、桌面
    ════════════════════════════════════════ */

    /* 小螢幕 (< 480px) — 手機 */
    @media (max-width: 479px) {
      body {
        padding: 3rem 1rem 2rem;
      }
      .header h1 {
        font-size: 0.9rem;
      }
      .header p {
        font-size: 0.62rem;
      }
      .cat-wrap {
        max-width: 80vw;
        margin-bottom: 1rem;
      }
      .chakra-group {
        width: 20px;
        height: 20px;
      }
      .chakra-dot {
        width: 11px;
        height: 11px;
      }
      .hint {
        font-size: 0.6rem;
        margin-top: 1.2rem;
      }
      .card-wrap {
        max-width: 90vw;
        margin-top: 1.8rem;
      }
      .card-body {
        padding: 1.4rem 1.2rem 1.2rem;
      }
      .card-head {
        gap: 0.6rem;
        margin-bottom: 1rem;
      }
      .card-name {
        font-size: 0.95rem;
      }
      .card-en {
        font-size: 0.55rem;
      }
      .state-label {
        font-size: 0.54rem;
        width: 2rem;
      }
      .state-tag {
        font-size: 0.62rem;
        padding: 0.15rem 0.5rem;
      }
      .card-desc-label,
      .card-action-label {
        font-size: 0.54rem;
      }
      .card-desc {
        font-size: 0.82rem;
      }
      .card-action {
        font-size: 0.76rem;
      }
    }

    /* 中螢幕 (480-768px) — 平板 */
    @media (min-width: 480px) and (max-width: 768px) {
      .cat-wrap {
        max-width: 85vw;
      }
      .chakra-group {
        width: 24px;
        height: 24px;
      }

const STORAGE_KEY = 'chakra_cat_data';

let chakras = (() => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return DEFAULTS.map(d => ({ ...d, flow: [...d.flow], imbalance: [...d.imbalance] }));
})();

// ════════════════════════════════════════
//  工具
// ════════════════════════════════════════
function pageTint(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const base = [245,243,239];
  const t = 0.09;
  return `rgb(${Math.round(base[0]+(r-base[0])*t)},${Math.round(base[1]+(g-base[1])*t)},${Math.round(base[2]+(b-base[2])*t)})`;
}

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ════════════════════════════════════════
//  特效：海底輪 — 根絲
// ════════════════════════════════════════
function startRoots(group) {
  const config = [
    { angle: -24, len: 44, w: 1.5, blur: 0.8, dur: 2.8, delay: 0.1  },
    { angle: -10, len: 56, w: 2.0, blur: 0.5, dur: 3.0, delay: 0.45 },
    { angle:   0, len: 68, w: 3.0, blur: 0.3, dur: 2.9, delay: 0    },
    { angle:  10, len: 56, w: 2.0, blur: 0.5, dur: 3.0, delay: 0.45 },
    { angle:  24, len: 44, w: 1.5, blur: 0.8, dur: 2.8, delay: 0.1  },
  ];
  config.forEach(({ angle, len, w, blur, dur, delay }) => {
    const strand = document.createElement('div');
    strand.className = 'root-strand';
    strand.style.setProperty('--len',   len  + 'px');
    strand.style.setProperty('--w',     w    + 'px');
    strand.style.setProperty('--blur',  blur + 'px');
    strand.style.setProperty('--dur',   dur  + 's');
    strand.style.setProperty('--delay', delay + 's');
    strand.style.transform = `rotate(${angle}deg)`;
    group.appendChild(strand);
  });
}

function stopRoots(group) {
  group.querySelectorAll('.root-strand').forEach(el => el.remove());
}

// ════════════════════════════════════════
//  特效：頂輪 — 光柱 ＋ 粒子
// ════════════════════════════════════════
let crownTimer = null;

function startCrownEffect(group) {
  // 光柱
  const beam = document.createElement('div');
  beam.className = 'crown-beam';
  group.appendChild(beam);

  // 持續噴出粒子
  function spawnParticle() {
    if (!group.classList.contains('active')) return;
    const p = document.createElement('div');
    p.className = 'crown-particle';
    const size    = 1.5 + Math.random() * 2.5;
    const drift   = (Math.random() - 0.5) * 22;
    const dur     = 2.2 + Math.random() * 1.4;
    const offsetX = (Math.random() - 0.5) * 8;
    p.style.width  = size + 'px';
    p.style.height = size + 'px';
    p.style.left   = `calc(50% + ${offsetX}px)`;
    p.style.top    = '50%';
    p.style.opacity = 0.55 + Math.random() * 0.3;
    p.style.setProperty('--drift', drift + 'px');
    p.style.animationDuration = dur + 's';
    group.appendChild(p);
    setTimeout(() => p.remove(), dur * 1000);
  }

  spawnParticle();
  crownTimer = setInterval(spawnParticle, 480);
}

function stopCrownEffect(group) {
  clearInterval(crownTimer);
  crownTimer = null;
  group.querySelectorAll('.crown-beam, .crown-particle').forEach(el => el.remove());
}

// ════════════════════════════════════════
//  特效：啟動 / 停止 分派
// ════════════════════════════════════════
function startEffect(group, i) {
  if (i === 0) startRoots(group);
  if (i === 6) startCrownEffect(group);
}

function stopEffect(group, i) {
  if (i === 0) stopRoots(group);
  if (i === 6) stopCrownEffect(group);
}

// ════════════════════════════════════════
//  顯示卡片
// ════════════════════════════════════════
let activeI = -1;
const cardWrap = document.getElementById('cardWrap');
const hint     = document.getElementById('hint');

function showCard(i) {
  const c = chakras[i];

  document.getElementById('cardStrip').style.background   = c.color;
  document.getElementById('cardDotIcon').style.background = c.color;
  document.getElementById('cardName').textContent          = c.name;
  document.getElementById('cardEn').textContent            = c.en;
  document.getElementById('cardDesc').textContent          = c.desc;
  document.getElementById('cardAction').textContent        = c.action;

  const statesEl = document.getElementById('cardStates');
  statesEl.innerHTML = '';

  function makeStateRow(label, words, type) {
    const row = document.createElement('div');
    row.className = 'state-row';
    const lbl = document.createElement('span');
    lbl.className = 'state-label';
    lbl.textContent = label;
    row.appendChild(lbl);
    const tags = document.createElement('div');
    tags.className = 'state-tags';
    words.forEach(w => {
      const tag = document.createElement('span');
      tag.className = `state-tag ${type}`;
      tag.textContent = w;
      if (type === 'flow') {
        tag.style.background = hexAlpha(c.color, 0.75);
      } else {
        tag.style.border = `1px solid ${hexAlpha(c.color, 0.45)}`;
        tag.style.color  = hexAlpha(c.color, 0.85);
      }
      tags.appendChild(tag);
    });
    row.appendChild(tags);
    return row;
  }

  statesEl.appendChild(makeStateRow('順流', c.flow, 'flow'));
  statesEl.appendChild(makeStateRow('失衡', c.imbalance, 'imbalance'));

  // ── 延伸閱讀 ──
  const extra = c.extra || DEFAULTS[i].extra;
  const extraEl = document.getElementById('cardExtra');
  extraEl.innerHTML = '';

  const toggle = document.createElement('button');
  toggle.className = 'card-extra-toggle';
  toggle.innerHTML = `延伸閱讀 <span class="card-extra-arrow">▸</span>`;

  const body = document.createElement('div');
  body.className = 'card-extra-body';

  // 位置 + 元素
  const metaRow = document.createElement('div');
  metaRow.className = 'extra-meta';
  function metaItem(label, val) {
    if (!val) return null;
    const item = document.createElement('div');
    item.className = 'extra-meta-item';
    item.innerHTML = `<span class="extra-meta-label">${label}</span><span class="extra-meta-value">${val}</span>`;
    return item;
  }
  const posItem = metaItem('位置', extra.position);
  const elItem  = metaItem('元素', extra.element);
  if (posItem) metaRow.appendChild(posItem);
  if (elItem)  metaRow.appendChild(elItem);
  body.appendChild(metaRow);

  // 能量理解 / 轉化方向
  function extraSection(label, text) {
    const sec = document.createElement('div');
    sec.innerHTML = `<div class="extra-section-label">${label}</div><div class="extra-section-text">${text}</div>`;
    return sec;
  }
  body.appendChild(extraSection('能量理解', extra.insight));
  body.appendChild(extraSection('轉化方向', extra.transform));
  if (extra.meditation) {
    body.appendChild(extraSection('🧘 冥想提示', extra.meditation));
  }

  toggle.addEventListener('click', () => {
    toggle.classList.toggle('open');
    body.classList.toggle('open');
  });

  extraEl.appendChild(toggle);
  extraEl.appendChild(body);

  // LINE 分享按鈕
  let shareBtn = document.getElementById('lineShareBtn');
  if (!shareBtn) {
    shareBtn = document.createElement('button');
    shareBtn.id = 'lineShareBtn';
    shareBtn.className = 'line-share-btn';
    shareBtn.textContent = '分享到 LINE ↗';
    shareBtn.addEventListener('click', async () => {
      const cur = chakras[activeI];
      shareBtn.textContent = '傳送中…';
      shareBtn.disabled = true;
      try {
        await shareToLine(buildChakraFlexMessage([{
          name: cur.name, en: cur.en, color: cur.color,
          desc: cur.desc, extra: cur.extra
        }]));
      } catch(e) {}
      shareBtn.textContent = '分享到 LINE ↗';
      shareBtn.disabled = false;
    });
  }
  extraEl.appendChild(shareBtn);

  document.body.style.backgroundColor = pageTint(c.color);

  cardWrap.classList.remove('visible');
  void cardWrap.offsetWidth;
  cardWrap.classList.add('visible');

  hint.style.opacity = '0';
  setTimeout(() => cardWrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);
}

// ════════════════════════════════════════
//  點擊脈輪
// ════════════════════════════════════════
document.querySelectorAll('.chakra-group').forEach(g => {
  g.addEventListener('click', () => {
    const i = parseInt(g.dataset.i);

    // 關閉上一個特效
    const prevActive = document.querySelector('.chakra-group.active');
    if (prevActive) {
      stopEffect(prevActive, parseInt(prevActive.dataset.i));
      prevActive.classList.remove('active');
    }

    // 點同一個 → 收回
    if (activeI === i) {
      activeI = -1;
      cardWrap.classList.remove('visible');
      document.body.style.backgroundColor = '#f5f3ef';
      hint.style.opacity = '1';
      return;
    }

    activeI = i;
    g.classList.add('active');
    startEffect(g, i);
    showCard(i);
  });
});
